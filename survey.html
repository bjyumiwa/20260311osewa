<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>アンケート → ゲーム</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif;background:#0b1028;color:#eef2ff;}
    main{max-width:820px;margin:0 auto;padding:22px;}
    .card{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);border-radius:18px;padding:16px;margin:12px 0;}
    button{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#eef2ff;border-radius:14px;padding:12px 12px;font-weight:800;cursor:pointer;}
    button:active{transform:translateY(1px)}
    small{color:rgba(238,242,255,.72);line-height:1.7;display:block;}
    code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:8px;word-break:break-all;}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .ok{color:#b9f6ca;font-weight:900}.warn{color:#ffd6a5;font-weight:900}.hide{display:none !important}
  </style>
</head>
<body>
<main>
  <h1>アンケート</h1>
  <div class="card"><small>個人が特定される情報（氏名・メール・住所など）は入力しないでください。<br>先にGoogleフォームへ回答し、送信完了後にこのページへ戻るとゲームが解放されます。</small></div>
  <div class="card"><div>参加者ID（匿名）: <code id="pid"></code></div><small>フォーム側にこのIDが自動入力されるようにできます。</small></div>
  <div class="card"><div class="row"><button id="btnOpenForm">Googleフォームを開く</button><span id="status" class="warn">未回答</span></div><small style="margin-top:8px;">同じタブで開きます。送信が終わったら、送信完了画面のリンクから戻ってください。</small></div>
  <div class="card" id="returnBox"><small>Googleフォームの「確認メッセージ」に、次のURLを貼ってください。<br>送信後、そのリンクを押すと自動でゲームへ進みます。</small><div style="margin-top:10px;">戻りURL: <code id="returnUrl"></code></div><div class="row" style="margin-top:10px;"><button id="btnCopy">戻りURLをコピー</button></div></div>
  <div class="card hide" id="gameBox"><div class="ok">回答確認：OK</div><div style="margin-top:10px;"><button id="btnGoGame">ゲームへ進む</button></div></div>
</main>
<script>
(() => {
  const GAME_URL = "./index.html";
  const GIFT_SURVEY_DONE_KEY = "gift_survey_done";
  const GIFT_SURVEY_DONE_AT  = "gift_survey_done_at";
  const GIFT_SURVEY_PID_KEY  = "gift_pid";
  const OSEWA_SURVEY_DONE_KEY = "osewa_survey_done_v1";
  const OSEWA_SURVEY_DONE_AT  = "osewa_survey_done_at_v1";
  const OSEWA_SURVEY_PID_KEY  = "osewa_pid_v1";
  const FORM_URL_BASE = "https://docs.google.com/forms/d/e/1FAIpQLSdKcqLBRLcGALdwYhWQFD1tuZtbqXyLpTBxfZZ9Or2pug16Rg/viewform";
  const ENTRY_PID = "entry.1425663825";
  function uid(){try{const a=new Uint32Array(4);crypto.getRandomValues(a);return [...a].map(x=>x.toString(16).padStart(8,"0")).join("");}catch(_){return "id_"+Math.random().toString(16).slice(2)+"_"+Date.now().toString(16);}}
  function getOrCreatePid(){let v=localStorage.getItem(GIFT_SURVEY_PID_KEY)||localStorage.getItem(OSEWA_SURVEY_PID_KEY); if(!v) v="p_"+uid(); localStorage.setItem(GIFT_SURVEY_PID_KEY,v); localStorage.setItem(OSEWA_SURVEY_PID_KEY,v); return v;}
  function setDone(){const iso=new Date().toISOString(); localStorage.setItem(GIFT_SURVEY_DONE_KEY,"1"); localStorage.setItem(GIFT_SURVEY_DONE_AT,iso); localStorage.setItem(OSEWA_SURVEY_DONE_KEY,"1"); localStorage.setItem(OSEWA_SURVEY_DONE_AT,iso);}
  function isDone(){return localStorage.getItem(GIFT_SURVEY_DONE_KEY)==="1"||localStorage.getItem(OSEWA_SURVEY_DONE_KEY)==="1";}
  const pidEl=document.getElementById("pid"), btnOpen=document.getElementById("btnOpenForm"), statusEl=document.getElementById("status"), returnUrlEl=document.getElementById("returnUrl"), btnCopy=document.getElementById("btnCopy"), returnBox=document.getElementById("returnBox"), gameBox=document.getElementById("gameBox"), btnGo=document.getElementById("btnGoGame");
  const pid=getOrCreatePid(); pidEl.textContent=pid;
  function formUrl(){const u=new URL(FORM_URL_BASE); u.searchParams.set("usp","pp_url"); u.searchParams.set(ENTRY_PID,pid); return u.toString();}
  function buildReturnUrl(){const u=new URL(location.href); u.hash=""; u.searchParams.set("done","1"); return u.toString();}
  function goGame(){location.href=new URL(GAME_URL,location.href).toString();}
  function render(){const done=isDone(); if(done){statusEl.textContent="回答済み"; statusEl.className="ok"; returnBox.classList.add("hide"); gameBox.classList.remove("hide");} else {statusEl.textContent="未回答"; statusEl.className="warn"; returnBox.classList.remove("hide"); gameBox.classList.add("hide");}}
  const qs=new URLSearchParams(location.search); if(qs.get("done")==="1"){setDone(); qs.delete("done"); const cleaned=location.pathname+(qs.toString()?"?"+qs.toString():""); history.replaceState(null,"",cleaned); setTimeout(goGame,250);} 
  returnUrlEl.textContent=buildReturnUrl();
  btnOpen.addEventListener("click",()=>location.href=formUrl());
  btnCopy.addEventListener("click",async()=>{const txt=buildReturnUrl(); try{await navigator.clipboard.writeText(txt); btnCopy.textContent="コピーしました"; setTimeout(()=>btnCopy.textContent="戻りURLをコピー",1000);}catch(_){prompt("このURLをコピーしてください",txt);}});
  btnGo.addEventListener("click",goGame);
  render();
})();
</script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>3日間のお世話ゲーム</title>
  <style>
    :root{
      --bg0:#050816;
      --bg1:#0b1028;
      --card:rgba(255,255,255,.08);
      --text:#eef2ff;
      --muted:rgba(238,242,255,.72);
      --line:rgba(255,255,255,.14);
      --shadow:0 14px 40px rgba(0,0,0,.35);
      --radius:18px;
      --success:#b9f6ca;
      --warn:#ffd6a5;
      --accent1:#c4b5fd;
      --accent2:#93c5fd;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      background:
        radial-gradient(1200px 700px at 60% 10%, rgba(196,181,253,.11), transparent 60%),
        radial-gradient(900px 600px at 15% 80%, rgba(147,197,253,.11), transparent 60%),
        linear-gradient(180deg, rgba(5,8,22,.95), rgba(11,16,40,.96));
      min-height:100vh;
      overflow-x:hidden;
    }

    .wrap{max-width:1100px;margin:0 auto;padding:18px 14px 40px}

    .topbar{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      padding:10px 12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      position:sticky;
      top:10px;
      z-index:20;
      backdrop-filter:blur(10px);
    }

    .brand{display:flex;gap:10px;align-items:center}
    .brand .dot{
      width:12px;height:12px;border-radius:999px;
      background:linear-gradient(180deg,var(--accent1),var(--accent2));
      box-shadow:0 0 18px rgba(196,181,253,.35);
    }
    .brand .title{font-weight:800;font-size:14px}
    .brand .sub{font-size:12px;color:var(--muted);margin-top:2px}

    .statusRow{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
      flex:1;
      flex-wrap:wrap;
    }

    .pill,.countdown{
      display:flex;
      align-items:center;
      gap:8px;
      min-height:34px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      position:relative;
    }

    .countdown{
      border-color:rgba(147,197,253,.3);
      background:rgba(147,197,253,.1);
      font-size:13px;
      font-weight:700;
    }

    .countdown .icon{
      width:16px;height:16px;border-radius:999px;
      background:linear-gradient(45deg,var(--accent2),var(--accent1));
      animation:pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse{
      0%,100%{opacity:.6;transform:scale(1)}
      50%{opacity:1;transform:scale(1.1)}
    }

    .heartIcon{font-size:15px;line-height:1}

    .hearts{
      width:140px;
      height:10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.08);
      overflow:hidden;
    }

    .hearts > i{
      display:block;
      height:100%;
      width:50%;
      background:linear-gradient(90deg,var(--accent1),var(--accent2));
      transition:width .25s ease;
    }

    .toggle{cursor:pointer;user-select:none}

    .switch{
      width:42px;height:24px;border-radius:999px;
      border:1px solid rgba(255,255,255,.22);
      background:rgba(255,255,255,.08);
      position:relative;
      transition:.18s ease;
    }

    .switch::after{
      content:"";
      position:absolute;
      top:2px;left:2px;
      width:18px;height:18px;border-radius:999px;
      background:rgba(255,255,255,.85);
      box-shadow:0 8px 14px rgba(0,0,0,.25);
      transition:.18s ease;
    }

    .toggle[data-on="true"] .switch{
      background:rgba(154,230,180,.18);
      border-color:rgba(154,230,180,.28);
    }

    .toggle[data-on="true"] .switch::after{
      left:20px;
      background:rgba(154,230,180,.95);
    }

    .main{
      margin-top:14px;
      display:grid;
      grid-template-columns:1.5fr 1fr;
      gap:14px;
      align-items:start;
    }

    @media (max-width:900px){
      .main{grid-template-columns:1fr}
    }

    .card{
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .cardHeader{
      padding:12px 12px 10px;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .cardHeader .h{font-weight:800;font-size:14px}
    .cardHeader .hint{font-size:12px;color:var(--muted);margin-top:2px}
    .cardContent{padding:12px}

    button{
      appearance:none;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.06);
      color:var(--text);
      border-radius:14px;
      padding:12px 10px;
      cursor:pointer;
      font-weight:700;
      letter-spacing:.01em;
      box-shadow:0 12px 26px rgba(0,0,0,.22);
      transition:transform .08s ease, background .18s ease, border-color .18s ease, opacity .18s ease;
    }

    button:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.09);
      border-color:rgba(255,255,255,.22);
    }

    button:active{transform:translateY(0) scale(.99)}
    button[disabled]{opacity:.45;cursor:not-allowed;transform:none}
    .btnGhost{background:rgba(255,255,255,.03)}

    .choiceGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin:8px 0;
    }

    .choiceBtn{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:86px;
      padding:16px 12px !important;
      border-radius:16px;
      background:rgba(255,255,255,.06) !important;
      border:1.5px solid rgba(255,255,255,.14) !important;
    }

    .choiceBtn .icon{font-size:32px;line-height:1}
    .choiceBtn .label{font-size:13px;font-weight:800;text-align:center;line-height:1.3}
    .choiceBtn .sub{font-size:11px;color:var(--muted);text-align:center}

    .stage{
      position:relative;
      min-height:540px;
      padding:14px;
      overflow:hidden;
    }

    .stars{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.55;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,.8) 0 1px, transparent 2px),
        radial-gradient(circle at 40% 70%, rgba(255,255,255,.7) 0 1px, transparent 2px),
        radial-gradient(circle at 70% 30%, rgba(255,255,255,.7) 0 1px, transparent 2px),
        radial-gradient(circle at 85% 75%, rgba(255,255,255,.7) 0 1px, transparent 2px),
        radial-gradient(circle at 25% 50%, rgba(255,255,255,.55) 0 1px, transparent 2px);
      background-size:420px 260px;
      animation:drift 18s linear infinite;
    }

    @keyframes drift{
      0%{transform:translate3d(0,0,0)}
      100%{transform:translate3d(-80px,50px,0)}
    }

    .center{
      position:absolute;
      left:50%;
      top:55%;
      transform:translate(-50%,-50%);
      width:100%;
      max-width:560px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      padding:12px;
      z-index:10;
    }

    .entity{
      width:280px;
      height:280px;
      display:grid;
      place-items:center;
      position:relative;
    }

    .floaty{animation:floaty 2.8s ease-in-out infinite}

    @keyframes floaty{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
    }

    .entityBubble{
      position:absolute;
      top:-6px;
      right:6px;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      font-size:12px;
      color:var(--muted);
      backdrop-filter:blur(8px);
    }

    .entityImg{
      width:250px;
      height:250px;
      object-fit:contain;
      filter:drop-shadow(0 18px 26px rgba(0,0,0,.35));
    }

    .sleepStatus{
      position:absolute;
      bottom:-44px;
      left:50%;
      transform:translateX(-50%);
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(11,16,40,.92);
      color:var(--text);
      box-shadow:var(--shadow);
      z-index:110;
      display:none;
    }

    .toast.show{
      display:block;
      animation:toastIn .25s ease;
    }

    @keyframes toastIn{
      from{opacity:0;transform:translateX(-50%) translateY(8px)}
      to{opacity:1;transform:translateX(-50%) translateY(0)}
    }

    .modalOverlay,.surveyGate,.poopGameContainer,.endingScreen{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.62);
      backdrop-filter:blur(4px);
      display:none;
      place-items:center;
      z-index:100;
    }

    .modalOverlay.show,.surveyGate.show,.endingScreen.show{display:grid}
    .poopGameContainer.show{display:flex}

    .modalBox{
      background:rgba(11,16,40,.96);
      border:1px solid rgba(255,255,255,.14);
      border-radius:20px;
      padding:24px;
      max-width:560px;
      width:min(92vw,560px);
      max-height:84vh;
      overflow:auto;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
    }

    .modalBox h2{margin:0 0 8px;font-size:18px}
    .modalBox p,.modalBox small{color:var(--muted);line-height:1.7}

    .modalBtn{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .modalBtn button{
      flex:1;
      min-width:140px;
    }

    .pairCard{
      margin-top:12px;
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.1);
    }

    .pairProgress{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .pairTitle{
      font-size:16px;
      font-weight:800;
      margin-bottom:12px;
    }

    .pairBtns{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .choiceModalBtn{
      min-height:86px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
    }

    .historyHint{
      font-size:12px;
      color:var(--muted);
      margin-top:12px;
    }

    .poopGameContainer{
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:20px;
      background:linear-gradient(135deg, rgba(5,8,22,.98), rgba(11,16,40,.98));
      z-index:120;
    }

    .poopGameTitle{font-size:32px;font-weight:900}

    .poopGameArea{
      width:320px;
      height:320px;
      border:2px solid rgba(255,255,255,.2);
      border-radius:20px;
      background:rgba(255,255,255,.03);
      position:relative;
      overflow:hidden;
    }

    .poop{
      position:absolute;
      width:42px;
      height:42px;
      display:grid;
      place-items:center;
      font-size:28px;
      cursor:pointer;
      user-select:none;
      animation:poopBounce .6s ease-out;
    }

    @keyframes poopBounce{
      0%{transform:scale(0);opacity:1}
      50%{transform:scale(1.1)}
      100%{transform:scale(1)}
    }

    .poop:hover{transform:scale(1.14)}
    .poopScore{font-size:24px;font-weight:800}
    .poopHint{font-size:12px;color:var(--muted)}

    .surveyGate{
      background:linear-gradient(135deg, rgba(5,8,22,.98), rgba(11,16,40,.98));
      z-index:90;
    }

    .surveyPanel{
      width:min(92vw,520px);
      padding:28px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);
      text-align:center;
      box-shadow:var(--shadow);
    }

    .surveyPanel .icon{
      font-size:58px;
      margin-bottom:10px;
      animation:bounce 1.2s ease infinite;
    }

    @keyframes bounce{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
    }

    .surveyPanel .title{
      font-size:24px;
      font-weight:900;
      margin-bottom:10px;
    }

    .surveyPanel .desc{
      color:var(--muted);
      line-height:1.7;
      margin-bottom:18px;
    }

    .endingScreen .thanks{
      font-size:42px;
      font-weight:900;
      letter-spacing:.08em;
    }

    .endingScreen .sub{
      margin-top:12px;
      color:var(--muted);
      text-align:center;
      line-height:1.8;
    }

    .logList{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .logDay{
      padding:12px;
      border:1px solid rgba(255,255,255,.1);
      border-radius:14px;
      background:rgba(255,255,255,.03);
    }

    .logDay h3{
      margin:0 0 8px;
      font-size:14px;
    }

    .logDay ul{
      margin:0;
      padding-left:18px;
      color:var(--muted);
      line-height:1.7;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="dot"></div>
      <div>
        <div class="title">お世話ゲーム</div>
        <div class="sub">Day <span id="dayNum">1</span> / 3</div>
      </div>
    </div>
    <div class="statusRow">
      <div class="countdown" id="countdown">
        <span class="icon"></span>
        <span id="countdownText">計測中...</span>
      </div>
      <div class="pill">
        <span class="heartIcon">💗</span>
        <div class="hearts"><i id="heartFill"></i></div>
        <small id="heartVal">?/10</small>
      </div>
      <div class="pill toggle" id="sitterToggle" data-on="false" title="Sitter Mode">
        <small>シッター</small>
        <div class="switch"></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="card">
      <div class="cardHeader">
        <div>
          <div class="h">キャラ</div>
          <div class="hint" id="charStatus">準備中...</div>
        </div>
      </div>
      <div class="cardContent" style="position:relative; min-height:560px; padding:0;">
        <div class="stage">
          <div class="stars"></div>
          <div class="center">
            <div class="entity floaty">
              <div class="entityBubble" id="entityBubble">まってる</div>
              <img id="entityImg" class="entityImg" alt="character">
              <div class="sleepStatus" id="sleepStatus"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="cardHeader">
        <div>
          <div class="h">コマンド</div>
          <div class="hint">ごはんは20種類の2択を順番に出します</div>
        </div>
        <button style="width:auto; padding:8px 10px; font-size:11px;" id="btnLetter">💌 手紙を読む</button>
      </div>
      <div class="cardContent">
        <div style="display:flex; flex-direction:column; gap:8px;">
          <div>
            <small style="color:var(--muted); display:block; margin-bottom:4px;">ごはん</small>
            <div class="choiceGrid">
              <button class="choiceBtn" id="btnFood">
                <span class="icon">🍚</span>
                <span class="label">ごはん</span>
                <span class="sub">20この2たく</span>
              </button>
              <button class="choiceBtn" id="btnOut">
                <span class="icon">🌳</span>
                <span class="label">おでかけ</span>
                <span class="sub">2たく</span>
              </button>
            </div>
          </div>

          <div>
            <small style="color:var(--muted); display:block; margin-bottom:4px;">遊び</small>
            <div class="choiceGrid">
              <button class="choiceBtn" id="btnStyle">
                <span class="icon">✨</span>
                <span class="label">スタイル</span>
                <span class="sub">2たく</span>
              </button>
              <button class="choiceBtn" id="btnDrink">
                <span class="icon">🧃</span>
                <span class="label">ドリンク</span>
                <span class="sub">少し元気</span>
              </button>
            </div>
          </div>

          <div>
            <small style="color:var(--muted); display:block; margin-bottom:4px;">ケア</small>
            <div class="choiceGrid">
              <button class="choiceBtn" id="btnClean">
                <span class="icon">🧹</span>
                <span class="label">そうじ</span>
                <span class="sub">💩ゲーム</span>
              </button>
              <button class="choiceBtn" id="btnMacaron">
                <span class="icon">🍪</span>
                <span class="label">マカロン</span>
                <span class="sub">少し回復</span>
              </button>
            </div>
          </div>
        </div>

        <hr style="border:0; border-top:1px solid rgba(255,255,255,.08); margin:12px 0;">

        <div style="display:flex; flex-direction:column; gap:8px;">
          <button style="width:100%;" id="btnName">名前を決める</button>
          <button style="width:100%;" class="btnGhost" id="btnLogs">📊 ログ</button>
          <button style="width:100%;" class="btnGhost" id="btnReset">🔄 リセット</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="surveyGate" id="surveyGate">
  <div class="surveyPanel">
    <div class="icon">📋</div>
    <div class="title">ゲーム開始前に</div>
    <div class="desc">最初にアンケートへ進みます。<br>送信後に戻ると、このままゲームが始まります。</div>
    <button id="btnGoSurvey" style="width:100%; margin-bottom:10px;">アンケートへ進む</button>
    <button id="btnSkipSurvey" class="btnGhost" style="width:100%;">あとで</button>
  </div>
</div>

<div class="modalOverlay" id="choiceModal">
  <div class="modalBox">
    <h2 id="choiceModalTitle">2択</h2>
    <small id="choiceModalDesc">どちらかを選ぶ</small>
    <div class="pairCard">
      <div class="pairProgress" id="choiceProgress">1 / 20</div>
      <div class="pairTitle" id="choiceQuestion">どっちにする？</div>
      <div class="pairBtns">
        <button class="choiceModalBtn" id="choiceLeft">左</button>
        <button class="choiceModalBtn" id="choiceRight">右</button>
      </div>
    </div>
    <div class="historyHint" id="choiceHint">選ぶたびに次の2択へ進みます。</div>
    <div class="modalBtn">
      <button class="btnGhost" id="btnChoiceClose">閉じる</button>
    </div>
  </div>
</div>

<div class="modalOverlay" id="letterModal">
  <div class="modalBox">
    <h2>💌 お手紙</h2>
    <div style="background:rgba(255,255,255,.05); border-radius:12px; padding:16px; margin:16px 0; line-height:1.8; white-space:pre-wrap; font-size:13px; color:var(--muted);" id="letterContent"></div>
    <button style="width:100%; margin-top:16px;" id="btnLetterClose">手紙を閉じる</button>
  </div>
</div>

<div class="modalOverlay" id="logsModal">
  <div class="modalBox">
    <h2>3日間の記録</h2>
    <div class="logList" id="logsContent"></div>
    <div class="modalBtn">
      <button id="btnLogsClose">閉じる</button>
    </div>
  </div>
</div>

<div class="poopGameContainer" id="poopGame">
  <div class="poopGameTitle">そうじ</div>
  <div class="poopGameArea" id="poopGameArea"></div>
  <div class="poopScore" id="poopScore">0 / 5</div>
  <div class="poopHint">💩をタップしてきれいにしよう</div>
  <button id="btnPoopExit">終わる</button>
</div>

<div class="endingScreen" id="endingScreen">
  <div class="modalBox" style="text-align:center;">
    <div class="thanks">ありがとう</div>
    <div class="sub">3日間の記録だけが、静かに残ります。</div>
    <div class="modalBtn">
      <button id="btnEndingLogs">ログを見る</button>
      <button class="btnGhost" id="btnEndingClose">閉じる</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  "use strict";

  const SAVE_KEY = "tosewa_save_v2";

  const GIFT_SURVEY_DONE_KEY = "gift_survey_done";
  const GIFT_SURVEY_DONE_AT  = "gift_survey_done_at";
  const GIFT_SURVEY_PID_KEY  = "gift_pid";

  const OSEWA_SURVEY_DONE_KEY = "osewa_survey_done_v1";
  const OSEWA_SURVEY_DONE_AT  = "osewa_survey_done_at_v1";
  const OSEWA_SURVEY_PID_KEY  = "osewa_pid_v1";

  const HATCH_MS = 10000;
  const DAY_LENGTH_MS = 3600000;
  const TOTAL_DAYS = 3;
  const IDLE_SLEEP_AFTER_MS = 120000;
  const SLEEP_MS = 30000;
  const POOP_COUNT_TARGET = 5;

  const FOOD_CHOICES = [
    ["ごはん", "パン"],
    ["みそしる", "スープ"],
    ["りんご", "バナナ"],
    ["おにぎり", "サンドイッチ"],
    ["おちゃ", "ジュース"],
    ["うどん", "パスタ"],
    ["いちご", "ぶどう"],
    ["クッキー", "ビスケット"],
    ["オムライス", "カレー"],
    ["プリン", "ゼリー"],
    ["コーンスープ", "ポタージュ"],

  function now(){ return Date.now(); }

  function calcElapsedMs(save, atNow = now()){
    const created = new Date(save.createdAt).getTime();
    const currentPause = save.pausedSince ? (atNow - save.pausedSince) : 0;
    return Math.max(0, atNow - created - (save.pauseAccumMs || 0) - currentPause);
  }

  function pushLiveLog(save, text){
    save.events.push({

      day: save.day,
      text
    });

  function addChoice(save, category, text){
    const key = `day${save.day}_${category}`;
    if(!save.choices[key]) save.choices[key] = [];
    save.choices[key].push(text);
  }

  function recordHeart(save){
    const elapsed = calcElapsedMs(save);
    const last = save.heartHistory[save.heartHistory.length - 1];
    if(!last || last.v !== save.heart){
      save.heartHistory.push({ t: elapsed, v: round1(save.heart) });
    }
  }

  function round1(v){
    return Math.round(v * 10) / 10;
  }

  function isSleeping(save, elapsed){
    return !!save.sleepStartedAt && (elapsed - save.sleepStartedAt) < SLEEP_MS;
  }

  function startSleep(save, elapsed, logText){
    save.sleepStartedAt = elapsed;
    pushLiveLog(save, logText);
  }

  function updateDayBoundary(save, elapsed){
    const nextDay = Math.min(TOTAL_DAYS, Math.floor(elapsed / DAY_LENGTH_MS) + 1);
    if(nextDay !== save.day){
      save.day = nextDay;
      pushLiveLog(save, `Day ${save.day} 開始`);
    }
  }

  function maybeEnd(save, elapsed){
    if(save.ended) return;

    const finishedTime = elapsed >= DAY_LENGTH_MS * TOTAL_DAYS;
    const noHeart = save.heart <= 0;

    if(finishedTime || noHeart){
      save.ended = true;
      save.endedAt = new Date().toISOString();
      save.heart = Math.max(0, round1(save.heart));
      pushLiveLog(save, "ありがとう");
      saveSave(save);
      showEnding();
    }
  }

  function applyPassiveChange(save, elapsed){
    if(save.pausedSince || save.ended) return;

    const prev = save.lastSimElapsed || 0;
    const dt = Math.max(0, elapsed - prev) / 1000;
    if(!dt) return;

    save.hunger = Math.min(10, save.hunger + dt * 0.012);
    save.tired  = Math.min(10, save.tired  + dt * 0.010);
    save.dirty  = Math.min(10, save.dirty  + dt * 0.008);
    save.heart  = Math.max(0, save.heart  - dt * 0.0025);

    save.lastSimElapsed = elapsed;
  }

    recordHeart(save);
  }

  function updateCountdownText(save, elapsed){
    if(save.ended){
      ui.countdownText.textContent = "記録のみ";
      return;
    }

    if(!save.hatched){
      const left = Math.max(0, HATCH_MS - elapsed);
      const s = Math.ceil(left / 1000);
      ui.countdownText.textContent = `ふかまで ${s}秒`;
      return;
    }

    const left = Math.max(0, DAY_LENGTH_MS * TOTAL_DAYS - elapsed);
    const day = Math.min(TOTAL_DAYS, Math.floor(elapsed / DAY_LENGTH_MS) + 1);
    const mm = Math.floor((left % DAY_LENGTH_MS) / 60000);
    const ss = Math.floor((left % 60000) / 1000);
    ui.countdownText.textContent = `Day ${day} の途中 ${String(mm).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
  }

  function hiddenDelta(kind, index, side){
    const seed = ((index + 1) * (side + 2) + kind.length) % 5;

    if(kind === "food"){
      const map = [
        { heart: 0.8, hunger: -2.2, tired: 0.2 },
        { heart: 0.5, hunger: -1.7, dirty: 0.1 },
        { heart: 0.9, hunger: -1.9, tired: -0.2 },
        { heart: 0.3, hunger: -2.4, dirty: 0.2 },
        { heart: 0.6, hunger: -1.8, mood: 0.4 }
      ];
      return map[seed];
    }

    if(kind === "out"){
      const map = [
        { heart: 0.8, tired: 0.6, hunger: 0.4 },
        { heart: 0.4, tired: -0.6, hunger: 0.1 },
        { heart: 0.7, tired: 0.2, dirty: 0.5 },
        { heart: 0.5, tired: -0.2, mood: 0.5 },
        { heart: 0.6, hunger: 0.3, mood: 0.2 }
      ];
      return map[seed];
    }

    const map = [
      { heart: 0.8, mood: 0.6 },
      { heart: 0.5, mood: 0.3 },
      { heart: 0.7, tired: -0.2 },
      { heart: 0.4, dirty: -0.1 },
      { heart: 0.6, mood: 0.4 }
    ];
    return map[seed];
  }

  function applyDelta(save, delta){
    save.heart = clamp(save.heart + (delta.heart || 0), 0, 10);
    save.hunger = clamp(save.hunger + (delta.hunger || 0), 0, 10);
    save.tired = clamp(save.tired + (delta.tired || 0), 0, 10);
    save.dirty = clamp(save.dirty + (delta.dirty || 0), 0, 10);
    save.mood = clamp(save.mood + (delta.mood || 0), -10, 10);
  }

  function clamp(v, min, max){
    return Math.min(max, Math.max(min, v));
  }

  function selectCurrentChoice(side){
    if(!currentChoiceContext) return;

    const save = loadSave();
    if(!save || save.ended) return;

    const { kind, cursorKey, index, pair } = currentChoiceContext;
    const selected = pair[side];

    applyDelta(save, hiddenDelta(kind, index, side));
    save.cursors[cursorKey] += 1;
    touchAction(save);

    const label = `${pair[0]} / ${pair[1]} → ${selected}`;

    if(kind === "food"){
      pushLiveLog(save, `ごはんで「${selected}」を選んだ`);
      addChoice(save, "Food", label);
      showToast(`今日は「${selected}」にしました。`);
    }else if(kind === "out"){
      pushLiveLog(save, `おでかけで「${selected}」を選んだ`);
      addChoice(save, "Out", label);
      showToast(`「${selected}」を選びました。`);
    }else if(kind === "style"){
      pushLiveLog(save, `スタイルで「${selected}」を選んだ`);
      addChoice(save, "Style", label);
      showToast(`「${selected}」にしてみました。`);

    saveSave(save);
    closeChoiceModal();
  }

  function spawnPoops(){
    const area = ui.poopGameArea;
    const w = area.clientWidth;
    const h = area.clientHeight;

    for(let i = 0; i < 3; i++){
      setTimeout(() => {
        if(!ui.poopGame.classList.contains("show") || poopGameState.count >= poopGameState.target) return;

        const poop = document.createElement("div");
        poop.className = "poop";
        poop.textContent = "💩";
        poop.style.left = Math.random() * (w - 42) + "px";
        poop.style.top = Math.random() * (h - 42) + "px";

        poop.addEventListener("click", () => {
          poopGameState.count += 1;
          updatePoopScore();
          poop.remove();

          if(poopGameState.count >= poopGameState.target){
            setTimeout(endPoopGame, 250);
          }else{
            setTimeout(spawnPoops, 240);
          }
        }, { once: true });

        area.appendChild(poop);
      }, i * 260);
    }
  }

  function updatePoopScore(){
    ui.poopScore.textContent = `${poopGameState.count} / ${poopGameState.target}`;
  }

  function endPoopGame(){
    if(!ui.poopGame.classList.contains("show")) return;

    ui.poopGame.classList.remove("show");
    ui.poopGameArea.innerHTML = "";

    const save = loadSave();
    if(!save || save.ended) return;

    if(poopGameState.count > 0){
      save.dirty = clamp(save.dirty - 3.0, 0, 10);
      save.heart = clamp(save.heart + 0.8, 0, 10);
      touchAction(save);
      pushLiveLog(save, "そうじをした");
      addChoice(save, "Clean", `Complete (${poopGameState.count})`);
      saveSave(save);
      showToast("きれいになりました。");
    }
  }

  function buildDayLogs(save){
    const result = [];

    for(let day = 1; day <= TOTAL_DAYS; day++){
      const items = [];
      const dayEvents = (save.events || []).filter(e => e.day === day).map(e => e.text);
      const food = save.choices[`day${day}_Food`] || [];
      const out = save.choices[`day${day}_Out`] || [];
      const style = save.choices[`day${day}_Style`] || [];
      const clean = save.choices[`day${day}_Clean`] || [];
      const drink = save.choices[`day${day}_Drink`] || [];
      const macaron = save.choices[`day${day}_Macaron`] || [];

      items.push(`ハートの最後: ${round1(getDayHeart(save, day))}`);
      if(food.length) items.push(`ごはん: ${food.join(" / ")}`);
      if(out.length) items.push(`おでかけ: ${out.join(" / ")}`);
      if(style.length) items.push(`スタイル: ${style.join(" / ")}`);
      if(clean.length) items.push(`そうじ: ${clean.join(" / ")}`);
      if(drink.length) items.push(`ドリンク: ${drink.length}回`);
      if(macaron.length) items.push(`マカロン: ${macaron.length}回`);
      if(dayEvents.length) items.push(...dayEvents);
      if(!items.length) items.push("まだ記録がありません。");

      result.push({ day, items });
    }

    return result;
  }

  function getDayHeart(save, day){
    const upper = day * DAY_LENGTH_MS;
    const candidates = (save.heartHistory || []).filter(h => h.t <= upper);
    return candidates.length ? candidates[candidates.length - 1].v : save.heart;
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function toggleSitter(){
    const save = loadSave();
    if(!save || save.ended) return;

    if(!save.pausedSince){
      save.pausedSince = now();
      pushLiveLog(save, "シッター開始");
      showToast("シッターが見てくれます。");
    }else{
      const paused = now() - save.pausedSince;
      save.pauseAccumMs += paused;
      save.pausedSince = null;
      pushLiveLog(save, `シッター終了 (${Math.round(paused / 1000)}秒)`);
      showToast("また時間が動きはじめます。");
    }

    saveSave(save);
    ui.sitterToggle.dataset.on = save.pausedSince ? "true" : "false";
  }

  function changeName(){
    const save = loadSave();
    if(!save || save.ended) return;

    const newName = prompt("名前を入力してください:", save.name === "???" ? "" : save.name);
    if(!newName || !newName.trim()) return;

    save.name = newName.trim();
    pushLiveLog(save, `名前が「${save.name}」に決まった`);
    saveSave(save);
    showToast(`「${save.name}」になりました。`);
  }

  function resetGame(){
    if(!confirm("本当にリセットしますか？")) return;
    localStorage.removeItem(SAVE_KEY);
    location.reload();
  }

  function render(){
    const save = loadSave();
    if(!save) return;

    const elapsed = calcElapsedMs(save);
    applyPassiveChange(save, elapsed);
    hatchIfNeeded(save, elapsed);
    updateDayBoundary(save, elapsed);
    maybeAutoSleep(save, elapsed);
    maybeEnd(save, elapsed);

    ui.dayNum.textContent = save.day;
    ui.sitterToggle.dataset.on = save.pausedSince ? "true" : "false";
    updateHeartDisplay(save);
    updateCountdownText(save, elapsed);
    updateEntityDisplay(save);

    disableActions(save.ended);
    saveSave(save);
  }

  function disableActions(disabled){
    [ui.btnFood, ui.btnOut, ui.btnStyle, ui.btnClean, ui.btnDrink, ui.btnMacaron, ui.btnName].forEach(btn => {
      btn.disabled = disabled;
    });

    if(disabled){
      ui.charStatus.textContent = "記録だけが残っている";
    }
  }

  ui.btnGoSurvey.addEventListener("click", openSurveyPage);
  ui.btnSkipSurvey.addEventListener("click", () => ui.surveyGate.classList.remove("show"));

  ui.btnFood.addEventListener("click", () => openChoiceModal("food"));
  ui.btnOut.addEventListener("click", () => openChoiceModal("out"));
  ui.btnStyle.addEventListener("click", () => openChoiceModal("style"));
  ui.btnDrink.addEventListener("click", actDrink);
  ui.btnMacaron.addEventListener("click", actMacaron);
  ui.btnClean.addEventListener("click", startPoopGame);
  ui.sitterToggle.addEventListener("click", toggleSitter);
  ui.btnName.addEventListener("click", changeName);
  ui.btnReset.addEventListener("click", resetGame);

  ui.choiceLeft.addEventListener("click", () => selectCurrentChoice(0));
  ui.choiceRight.addEventListener("click", () => selectCurrentChoice(1));
  ui.btnChoiceClose.addEventListener("click", closeChoiceModal);

  ui.btnLetter.addEventListener("click", openLetter);
  ui.btnLetterClose.addEventListener("click", closeLetter);

  ui.btnLogs.addEventListener("click", openLogs);
  ui.btnLogsClose.addEventListener("click", closeLogs);
  ui.btnEndingLogs.addEventListener("click", () => {
    hideEnding();
    openLogs();
  });
  ui.btnEndingClose.addEventListener("click", hideEnding);
  ui.btnPoopExit.addEventListener("click", endPoopGame);

  [ui.choiceModal, ui.letterModal, ui.logsModal].forEach(modal => {
    modal.addEventListener("click", (e) => {
      if(e.target !== modal) return;
      if(modal === ui.choiceModal) closeChoiceModal();
      if(modal === ui.letterModal) closeLetter();
      if(modal === ui.logsModal) closeLogs();
    });
  });

  initSurveyGate();

  let save = loadSave();
  if(!save){
    save = createNewSave();
    pushLiveLog(save, "ゲーム開始");
    saveSave(save);
  }

  render();

  function tick(){
    render();
    requestAnimationFrame(tick);
  }

  tick();
})();
</script>
</body>
</html>

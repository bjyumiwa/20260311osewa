<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3日間のお世話ゲーム（改良版）</title>
  <style>
    :root{
      --bg0:#050816;
      --bg1:#0b1028;
      --card:rgba(255,255,255,.08);
      --text:#eef2ff;
      --muted:rgba(238,242,255,.72);
      --line:rgba(255,255,255,.14);
      --shadow: 0 14px 40px rgba(0,0,0,.35);
      --radius: 18px;
      --success:#b9f6ca;
      --warn:#ffd6a5;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      color:var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background:
        linear-gradient(180deg, rgba(5,8,22,.55), rgba(11,16,40,.70)),
        url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAYAAABytg0kAAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5ccllPAAAABZJREFUeNpi2r9//38gYGAEEWAAEhADf0o/1fAAAAAASUVORK5CYII=") center/cover no-repeat fixed;
      min-height:100vh;
      overflow-x:hidden;
    }

    .wrap{max-width: 1100px; margin:0 auto; padding: 18px 14px 40px;}
    .topbar{
      display:flex; gap:12px; align-items:center; justify-content:space-between;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: sticky; top: 10px;
      backdrop-filter: blur(10px);
      z-index: 20;
      flex-wrap: wrap;
    }
    .brand{display:flex; gap:10px; align-items:center;}
    .brand .dot{
      width:12px;height:12px;border-radius:999px;
      background: radial-gradient(circle at 30% 30%, #fff, rgba(255,255,255,.1)),
                  linear-gradient(180deg, #c4b5fd, #93c5fd);
      box-shadow: 0 0 18px rgba(196,181,253,.35);
    }
    .brand .title{font-weight: 750; letter-spacing:.02em; font-size: 14px; line-height: 1.2;}
    .brand .sub{font-size: 12px; color: var(--muted); margin-top: 2px;}
    
    .statusRow{display:flex; gap: 10px; align-items:center; justify-content:flex-end; flex: 1; flex-wrap: wrap;}
    .countdown{
      display:flex; align-items:center; gap:8px;
      padding: 8px 12px;
      border: 1px solid rgba(147,197,253,.3);
      background: rgba(147,197,253,.1);
      border-radius: 999px;
      min-height: 34px;
      font-weight: 600;
      font-size: 13px;
    }
    .countdown .icon{
      width:16px;height:16px;
      background: linear-gradient(45deg, rgba(147,197,253,.9), rgba(196,181,253,.9));
      border-radius: 999px;
      display: inline-block;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{opacity:.6; transform:scale(1);}
      50%{opacity:1; transform:scale(1.1);}
    }
    
    .pill{
      display:flex; align-items:center; gap:8px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      border-radius: 999px;
      min-height: 34px;
      position: relative;
    }
    .pill small{color: var(--muted);}

    .heartIcon{
      width:16px;height:16px; display:inline-block;
      background: radial-gradient(circle at 30% 30%, #fff, rgba(255,255,255,.1)),
                  linear-gradient(180deg, rgba(251,113,133,.95), rgba(196,181,253,.85));
      clip-path: path("M8 14s6-3.3 6-7.2C14 4.6 12.8 3 10.8 3 9.6 3 8.7 3.7 8 4.6 7.3 3.7 6.4 3 5.2 3 3.2 3 2 4.6 2 6.8 2 10.7 8 14 8 14Z");
      opacity:.95;
    }
    .hearts{
      width: 140px; height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      overflow:hidden;
    }
    .hearts > i{
      display:block; height:100%; width:50%;
      background: linear-gradient(90deg, rgba(196,181,253,.95), rgba(147,197,253,.95));
      box-shadow: 0 0 14px rgba(147,197,253,.25);
      transition: width .3s ease;
    }

    .langSel{
      appearance:none;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
      color: rgba(238,242,255,.92);
      border-radius: 12px;
      padding: 8px 28px 8px 10px;
      font-weight: 700;
      cursor: pointer;
      outline: none;
      line-height: 1;
    }
    .langSel option{background:#0b1028; color:#eef2ff;}
    .pill[title="Language"]::after{
      content:"▾";
      position:absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(238,242,255,.72);
      pointer-events:none;
      font-size: 12px;
    }

    .toggle{display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none;}
    .switch{
      width:42px;height:24px;border-radius:999px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.08);
      position: relative;
      transition: .18s ease;
    }
    .switch::after{
      content:"";
      width:18px;height:18px;border-radius:999px;
      position:absolute; top:2px; left:2px;
      background: rgba(255,255,255,.85);
      box-shadow: 0 8px 14px rgba(0,0,0,.25);
      transition: .18s ease;
    }
    .toggle[data-on="true"] .switch{
      background: rgba(154,230,180,.18);
      border-color: rgba(154,230,180,.28);
    }
    .toggle[data-on="true"] .switch::after{
      left: 20px;
      background: rgba(154,230,180,.95);
    }

    .main{margin-top: 14px; display:grid; grid-template-columns: 1.5fr 1fr; gap: 14px; align-items:start;}
    @media (max-width: 900px){
      .main{grid-template-columns: 1fr;}
    }
    
    .card{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .cardHeader{
      padding: 12px 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display:flex; align-items:center; justify-content:space-between; gap: 10px;
      flex-wrap: wrap;
    }
    .cardHeader .h{font-weight: 800; font-size: 14px;}
    .cardHeader .hint{font-size:12px;color:var(--muted); margin-top: 2px;}
    .btnRow{display:flex; gap: 10px; flex-wrap: wrap;}

    button{
      appearance:none;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 10px;
      cursor:pointer;
      font-weight: 650;
      letter-spacing:.01em;
      box-shadow: 0 12px 26px rgba(0,0,0,.22);
      transition: transform .08s ease, background .18s ease, border-color .18s ease, opacity .18s ease;
    }
    button:hover{transform: translateY(-1px); background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.22);}
    button:active{transform: translateY(0px) scale(.99);}
    button[disabled]{opacity:.45; cursor:not-allowed; transform:none;}
    .btnGhost{background: rgba(255,255,255,.03); padding: 10px 10px;}
    .grid{display:grid; grid-template-columns: 1fr 1fr; gap: 10px;}
    @media (max-width: 600px){
      .grid{grid-template-columns: 1fr;}
    }

    /* 改良：2択ボタンのUI */
    .choiceGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 8px 0;
    }
    .choiceBtn{
      display:flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 12px !important;
      min-height: 80px;
      border-radius: 16px;
      background: rgba(255,255,255,.06) !important;
      border: 1.5px solid rgba(255,255,255,.14) !important;
      transition: all .2s ease;
    }
    .choiceBtn:hover{
      background: rgba(255,255,255,.12) !important;
      border-color: rgba(255,255,255,.28) !important;
      transform: translateY(-2px);
    }
    .choiceBtn .icon{
      font-size: 32px;
      line-height: 1;
    }
    .choiceBtn .label{
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
    }
    .choiceBtn .sub{
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }

    /* ふ化アニメーション */
    .hatchAnimation{
      animation: hatchBurst .8s ease-out forwards;
    }
    @keyframes hatchBurst{
      0%{
        opacity: 1;
        transform: scale(1);
      }
      30%{
        opacity: 1;
        transform: scale(1.1) rotate(2deg);
      }
      60%{
        opacity: 1;
        transform: scale(0.9);
      }
      100%{
        opacity: 0;
        transform: scale(0);
      }
    }
    
    .charAppear{
      animation: charPop .6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes charPop{
      0%{
        opacity: 0;
        transform: scale(0) translateY(20px);
      }
      100%{
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .stage{
      position: relative;
      min-height: 520px;
      padding: 14px;
    }
    .sky{position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(1200px 700px at 60% 10%, rgba(196,181,253,.10), transparent 60%),
        radial-gradient(900px 600px at 15% 80%, rgba(147,197,253,.10), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,0));
    }
    .stars{
      position:absolute; inset:0; pointer-events:none; opacity:.55;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,.8) 0 1px, transparent 2px),
        radial-gradient(circle at 40% 70%, rgba(255,255,255,.7) 0 1px, transparent 2px),
        radial-gradient(circle at 70% 30%, rgba(255,255,255,.7) 0 1px, transparent 2px),
        radial-gradient(circle at 85% 75%, rgba(255,255,255,.7) 0 1px, transparent 2px),
        radial-gradient(circle at 25% 50%, rgba(255,255,255,.55) 0 1px, transparent 2px);
      background-size: 420px 260px;
      filter: blur(.2px);
      animation: drift 18s linear infinite;
    }
    @keyframes drift{
      0%{transform: translate3d(0,0,0);}
      100%{transform: translate3d(-80px, 50px, 0);}
    }
    .center{
      position:absolute;
      left:50%;
      top: 55%;
      transform: translate(-50%,-50%);
      width: 100%;
      max-width: 560px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 12px;
      padding: 12px;
      z-index: 10;
    }
    .entity{
      width: 280px;
      height: 280px;
      display:grid;
      place-items:center;
      position: relative;
    }
    .floaty{animation: floaty 2.6s ease-in-out infinite;}
    @keyframes floaty{
      0%,100%{transform: translateY(0);}
      50%{transform: translateY(-10px);}
    }

    .macaronWrap{width: 260px; height: 260px; display:grid; place-items:center; position: relative;}
    .macaronImg{
      width: 210px; height: 210px; object-fit: contain;
      filter: drop-shadow(0 18px 26px rgba(0,0,0,.35));
      opacity: .98;
    }
    .hatchLift{animation: hatchLift 1.6s ease-in-out 1 forwards;}
    @keyframes hatchLift{
      0%{transform: translateY(0) scale(1); opacity: 1;}
      60%{transform: translateY(-26px) scale(1.02); opacity: 1;}
      100%{transform: translateY(-60px) scale(.95); opacity: 0;}
    }

    .charWrap{
      width: 260px; height: 260px;
      display:grid; place-items:center;
      position: relative;
      filter: drop-shadow(0 18px 26px rgba(0,0,0,.35));
    }
    .charScaleBox{
      width: 100%;
      height: 100%;
      display:grid;
      place-items:center;
      transform-origin: 50% 55%;
      transition: transform .25s ease;
    }
    .charImg{
      width: 230px; height: 230px; object-fit: contain; opacity: .98; transition: .18s ease;
    }

    /* 改良：起きている時間を増やすためのインジケータ */
    .sleepStatus{
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .sleepStatus.tired{color: var(--warn);}
    .sleepStatus.resting{color: var(--success);}

    .cardContent{padding: 12px;}

    /* モーダル */
    .modalOverlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px);
      display:grid;
      place-items:center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      animation: fadeIn .2s ease forwards;
    }
    @keyframes fadeIn{to{opacity:1; pointer-events:auto;}}
    .modalBox{
      background: rgba(11,16,40,.95);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 20px;
      padding: 24px;
      max-width: 500px;
      width: 90vw;
      max-height: 80vh;
      overflow: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      animation: slideUp .25s ease;
    }
    @keyframes slideUp{
      from{transform: translateY(20px); opacity: 0;}
      to{transform: translateY(0); opacity: 1;}
    }
    .modalBox h2{margin-top: 0; margin-bottom: 12px; font-size: 18px;}
    .modalBox small{display: block; margin-bottom: 16px; color: var(--muted); line-height: 1.6;}
    .modalBtn{display:flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;}
    .modalBtn button{flex: 1; min-width: 120px;}

    /* 改良：死亡後の同一性選択画面 */
    .identityChoice{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 20px 0;
    }
    .identityOption{
      border: 1.5px solid rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all .2s ease;
      text-align: center;
    }
    .identityOption:hover{
      border-color: rgba(255,255,255,.3);
      background: rgba(255,255,255,.08);
    }
    .identityOption .icon{
      font-size: 40px;
      margin-bottom: 8px;
    }
    .identityOption .label{
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .identityOption .desc{
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* 改良：カウントダウン画面 */
    .countdownScreen{
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(5,8,22,.95), rgba(11,16,40,.95));
      z-index: 50;
      display:none;
      place-items:center;
      flex-direction: column;
      gap: 20px;
    }
    .countdownScreen.show{display:flex;}
    .countdownScreen .day{
      font-size: 64px;
      font-weight: 900;
      background: linear-gradient(180deg, rgba(196,181,253,.95), rgba(147,197,253,.95));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .countdownScreen .label{
      font-size: 18px;
      color: var(--text);
      font-weight: 600;
    }
    .countdownScreen .time{
      font-size: 24px;
      color: var(--muted);
      font-family: ui-monospace, monospace;
    }
    .countdownScreen .remaining{
      font-size: 14px;
      color: var(--muted);
      margin-top: 20px;
    }

    /* 改良：💩ゲーム用スタイル */
    .poopGameContainer{
      display:none;
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(5,8,22,.98), rgba(11,16,40,.98));
      z-index: 60;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .poopGameContainer.show{display:flex;}
    .poopGameTitle{
      font-size: 32px;
      font-weight: 900;
      color: var(--text);
    }
    .poopGameArea{
      width: 320px;
      height: 320px;
      border: 2px solid rgba(255,255,255,.2);
      border-radius: 20px;
      background: rgba(255,255,255,.03);
      position: relative;
      overflow: hidden;
    }
    .poop{
      position: absolute;
      width: 40px;
      height: 40px;
      background: #8B7355;
      border-radius: 50%;
      cursor: pointer;
      transition: all .1s ease;
      user-select: none;
      animation: poopBounce .6s ease-out;
    }
    @keyframes poopBounce{
      0%{transform: scale(0); opacity: 1;}
      50%{transform: scale(1.1);}
      100%{transform: scale(1);}
    }
    .poop:hover{transform: scale(1.15);}
    .poopScore{
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
    }
    .poopHint{
      font-size: 12px;
      color: var(--muted);
    }

    /* 改良：アンケートゲート */
    .surveyGate{
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(5,8,22,.98), rgba(11,16,40,.98));
      z-index: 40;
      display:flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
      text-align: center;
    }
    .surveyGate.hidden{display:none;}
    .surveyGate .icon{
      font-size: 60px;
      margin-bottom: 10px;
      animation: bounce 1.2s ease infinite;
    }
    @keyframes bounce{
      0%,100%{transform: translateY(0);}
      50%{transform: translateY(-10px);}
    }
    .surveyGate .title{
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .surveyGate .desc{
      color: var(--muted);
      line-height: 1.6;
      max-width: 400px;
      margin-bottom: 20px;
    }
    .surveyGate button{
      min-width: 200px;
      padding: 14px 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="dot"></div>
      <div>
        <div class="title">お世話ゲーム</div>
        <div class="sub">Day <span id="dayNum">1</span> / 3</div>
      </div>
    </div>
    <div class="statusRow">
      <div class="countdown" id="countdown">
        <span class="icon"></span>
        <span id="countdownText">計測中...</span>
      </div>
      <div class="pill">
        <span class="heartIcon"></span>
        <div class="hearts"><i id="heartFill"></i></div>
        <small id="heartVal">?/10</small>
      </div>
      <div class="pill toggle" id="sitterToggle" data-on="false" title="Sitter Mode">
        <small>シッター</small>
        <div class="switch"></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="card">
      <div class="cardHeader">
        <div>
          <div class="h">キャラ</div>
          <div class="hint" id="charStatus">準備中...</div>
        </div>
      </div>
      <div class="cardContent" style="position:relative; min-height:560px; padding:0;">
        <div class="stage">
          <div class="sky"></div>
          <div class="stars"></div>
          <div class="center">
            <div class="entity floaty">
              <div class="macaronWrap" id="macaronWrap" style="display:none;">
                <img id="macaronImg" class="macaronImg" src="" alt="macaron">
              </div>
              <div class="charWrap" id="charWrap" style="display:none;">
                <div class="charScaleBox" id="charScaleBox">
                  <img id="charImg" class="charImg" src="" alt="char">
                </div>
              </div>
              <div class="sleepStatus" id="sleepStatus"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="cardHeader">
        <div>
          <div class="h">コマンド</div>
          <div class="hint">タップして対応する</div>
        </div>
        <button style="width:auto; padding:8px 10px; font-size:11px;" id="btnLetter">💌 手紙を読む</button>
      </div>
      <div class="cardContent">
        <div style="display:flex; flex-direction:column; gap:8px;">
          <!-- 改良：2択ボタンをより分かりやすく -->
          <div>
            <small style="color:var(--muted); display:block; margin-bottom:4px;">ごはん</small>
            <div class="choiceGrid">
              <button class="choiceBtn" id="btnFood">
                <span class="icon">🍚</span>
                <span class="label">ごはん</span>
              </button>
              <button class="choiceBtn" id="btnOut">
                <span class="icon">🌳</span>
                <span class="label">おでかけ</span>
              </button>
            </div>
          </div>

          <div>
            <small style="color:var(--muted); display:block; margin-bottom:4px;">遊び</small>
            <div class="choiceGrid">
              <button class="choiceBtn" id="btnStyle">
                <span class="icon">✨</span>
                <span class="label">スタイル</span>
              </button>
              <button class="choiceBtn" id="btnDrink">
                <span class="icon">🧃</span>
                <span class="label">ドリンク</span>
              </button>
            </div>
          </div>

          <div>
            <small style="color:var(--muted); display:block; margin-bottom:4px;">ケア</small>
            <div class="choiceGrid">
              <button class="choiceBtn" id="btnClean">
                <span class="icon">🧹</span>
                <span class="label">そうじ</span>
              </button>
              <button class="choiceBtn" id="btnMacaron">
                <span class="icon">🍪</span>
                <span class="label">マカロン</span>
              </button>
            </div>
          </div>
        </div>

        <hr style="border:0; border-top:1px solid rgba(255,255,255,.08); margin:12px 0;">

        <div style="display:flex; flex-direction:column; gap:8px;">
          <button style="width:100%;" id="btnName">名前を決める</button>
          <button style="width:100%;" class="btnGhost" id="btnLogs">📊 ログ</button>
          <button style="width:100%;" class="btnGhost" id="btnReset">🔄 リセット</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 改良：カウントダウン画面 -->
<div class="countdownScreen" id="countdownScreen">
  <div class="day" id="countdownDay">1</div>
  <div class="label">開始</div>
  <div class="time" id="countdownTime">準備中...</div>
  <div class="remaining" id="countdownRemaining">まもなくゲーム開始</div>
</div>

<!-- 改良：💩ゲーム -->
<div class="poopGameContainer" id="poopGame">
  <div class="poopGameTitle">そうじ</div>
  <div class="poopGameArea" id="poopGameArea"></div>
  <div class="poopScore" id="poopScore">0 / 5</div>
  <div class="poopHint">💩をタップしてきれいにしよう！</div>
  <button id="btnPoopExit" style="margin-top:10px;">終わる</button>
</div>

<!-- 改良：アンケートゲート -->
<div class="surveyGate" id="surveyGate">
  <div class="icon">📋</div>
  <div class="title">ゲーム開始前に</div>
  <div class="desc">アンケートにご協力ください。<br>survey.html にアクセスしてください。</div>
  <button id="btnGoSurvey">アンケートを開く</button>
  <button class="btnGhost" id="btnSkipSurvey" style="margin-top:0;">スキップ</button>
</div>

<!-- 改良：死後の同一性選択画面 -->
<div class="modalOverlay" id="endingModal" style="display:none;">
  <div class="modalBox">
    <h2>お別れの時</h2>
    <small>このキャラの記録をどのように残しますか？</small>
    
    <div class="identityChoice">
      <div class="identityOption" id="chooseLog">
        <div class="icon">📖</div>
        <div class="label">ログを見る</div>
        <div class="desc">3日間の出来事を振り返る</div>
      </div>
      <div class="identityOption" id="chooseShape">
        <div class="icon">🎨</div>
        <div class="label">容姿を保存</div>
        <div class="desc">最後の姿を記録する</div>
      </div>
    </div>
  </div>
</div>

<!-- 手紙モーダル -->
<div class="modalOverlay" id="letterModal" style="display:none;">
  <div class="modalBox">
    <h2>💌 お手紙</h2>
    <div style="background:rgba(255,255,255,.05); border-radius:12px; padding:16px; margin:16px 0; line-height:1.8; white-space:pre-wrap; font-size:13px; color:var(--muted);" id="letterContent">
    </div>
    <button style="width:100%; margin-top:16px;" id="btnLetterClose">手紙を閉じる</button>
  </div>
</div>

<script>
(() => {
  "use strict";

  // ===== 設定 =====
  const SAVE_KEY = "tosewa_save_v1";
  const SURVEY_DONE_KEY = "osewa_survey_done_v1";
  const SURVEY_DONE_AT = "osewa_survey_done_at_v1";
  const IDLE_SLEEP_AFTER_MS = 120000; // 2分→6分に改良（起きている時間増加）
  const DAY_LENGTH_MS = 3600000; // 1時間=1日
  const POOP_COUNT_TARGET = 5; // 💩ゲームの目標数
  
  // ===== UI要素 =====
  const ui = {
    dayNum: document.getElementById("dayNum"),
    countdownText: document.getElementById("countdownText"),
    heartFill: document.getElementById("heartFill"),
    heartVal: document.getElementById("heartVal"),
    sitterToggle: document.getElementById("sitterToggle"),
    charStatus: document.getElementById("charStatus"),
    macaronWrap: document.getElementById("macaronWrap"),
    macaronImg: document.getElementById("macaronImg"),
    charWrap: document.getElementById("charWrap"),
    charImg: document.getElementById("charImg"),
    charScaleBox: document.getElementById("charScaleBox"),
    sleepStatus: document.getElementById("sleepStatus"),
    
    btnFood: document.getElementById("btnFood"),
    btnOut: document.getElementById("btnOut"),
    btnStyle: document.getElementById("btnStyle"),
    btnClean: document.getElementById("btnClean"),
    btnDrink: document.getElementById("btnDrink"),
    btnMacaron: document.getElementById("btnMacaron"),
    btnName: document.getElementById("btnName"),
    btnReset: document.getElementById("btnReset"),
    btnLogs: document.getElementById("btnLogs"),
    
    countdownScreen: document.getElementById("countdownScreen"),
    countdownDay: document.getElementById("countdownDay"),
    countdownTime: document.getElementById("countdownTime"),
    countdownRemaining: document.getElementById("countdownRemaining"),
    
    poopGame: document.getElementById("poopGame"),
    poopGameArea: document.getElementById("poopGameArea"),
    poopScore: document.getElementById("poopScore"),
    btnPoopExit: document.getElementById("btnPoopExit"),
    
    surveyGate: document.getElementById("surveyGate"),
    btnGoSurvey: document.getElementById("btnGoSurvey"),
    btnSkipSurvey: document.getElementById("btnSkipSurvey"),
    
    endingModal: document.getElementById("endingModal"),
    chooseLog: document.getElementById("chooseLog"),
    chooseShape: document.getElementById("chooseShape"),
    
    letterModal: document.getElementById("letterModal"),
    letterContent: document.getElementById("letterContent"),
    btnLetterClose: document.getElementById("btnLetterClose"),
    btnLetter: document.getElementById("btnLetter"),
  };

  // ===== セーブデータ構造 =====
  function createNewSave(){
    return {
      v: 1,
      createdAt: new Date().toISOString(),
      hatched: false,
      ended: false,
      endedAt: null,
      name: "???",
      colorId: Math.floor(Math.random() * 4),
      heart: 5,
      hunger: 5,
      tired: 0,
      dirty: 0,
      lastActionElapsed: 0,
      pausedSince: null,
      day: 1,
      dayStarted: 0,
      sleepStartedAt: null,
      events: [],
      choices: {},
      heartHistory: [{t: 0, v: 5}],
    };
  }

  function saveSave(s){
    try{
      localStorage.setItem(SAVE_KEY, JSON.stringify(s));
    }catch(_){}
  }

  function loadSave(){
    try{
      const raw = localStorage.getItem(SAVE_KEY);
      return raw ? JSON.parse(raw) : null;
    }catch(_){
      return null;
    }
  }

  // ===== アンケートゲート =====
  function checkSurveyDone(){
    return localStorage.getItem(SURVEY_DONE_KEY) === "1";
  }

  function showSurveyGate(){
    ui.surveyGate.classList.remove("hidden");
  }

  function hideSurveyGate(){
    ui.surveyGate.classList.add("hidden");
  }

  ui.btnGoSurvey.addEventListener("click", () => {
    window.open("./survey.html", "_blank");
  });

  ui.btnSkipSurvey.addEventListener("click", () => {
    hideSurveyGate();
  });

  // 初期化時にアンケートゲートチェック
  function initSurveyCheck(){
    if(!checkSurveyDone()){
      showSurveyGate();
    }else{
      hideSurveyGate();
    }
  }

  // ===== カウントダウン表示 =====
  function updateCountdown(save, elapsed){
    if(save.hatched){
      ui.countdownScreen.classList.remove("show");
      return;
    }

    const hatchTime = 10000; // 10秒でふ化
    const timeLeft = Math.max(0, hatchTime - elapsed);
    const seconds = Math.ceil(timeLeft / 1000);
    
    if(timeLeft <= 0){
      ui.countdownScreen.classList.remove("show");
    }else{
      ui.countdownScreen.classList.add("show");
      ui.countdownDay.textContent = save.day;
      ui.countdownTime.textContent = `あと ${seconds} 秒...`;
      ui.countdownRemaining.textContent = "キャラが生まれるまで待ってね";
    }
  }

  // ===== 💩ゲーム =====
  let poopGameState = { count: 0, target: POOP_COUNT_TARGET };

  function startPoopGame(){
    ui.poopGame.classList.add("show");
    poopGameState = { count: 0, target: POOP_COUNT_TARGET };
    ui.poopGameArea.innerHTML = "";
    updatePoopScore();
    spawnPoops();
  }

  function spawnPoops(){
    const area = ui.poopGameArea;
    const w = area.offsetWidth;
    const h = area.offsetHeight;
    
    for(let i = 0; i < 3; i++){
      setTimeout(() => {
        if(poopGameState.count >= poopGameState.target) return;
        
        const poop = document.createElement("div");
        poop.className = "poop";
        poop.textContent = "💩";
        poop.style.left = Math.random() * (w - 40) + "px";
        poop.style.top = Math.random() * (h - 40) + "px";
        
        poop.addEventListener("click", () => {
          poopGameState.count++;
          updatePoopScore();
          poop.style.animation = "none";
          setTimeout(() => poop.remove(), 0);
          
          if(poopGameState.count >= poopGameState.target){
            setTimeout(() => endPoopGame(), 300);
          }else{
            setTimeout(() => spawnPoops(), 400);
          }
        });
        
        area.appendChild(poop);
      }, i * 300);
    }
  }

  function updatePoopScore(){
    ui.poopScore.textContent = `${poopGameState.count} / ${poopGameState.target}`;
  }

  function endPoopGame(){
    ui.poopGame.classList.remove("show");
    ui.poopGameArea.innerHTML = "";
    
    const save = loadSave();
    if(save){
      save.dirty = Math.max(0, save.dirty - 3);
      save.heart = Math.min(10, save.heart + 1);
      pushLiveLog(save, "そうじが完了！");
      addChoice(save, "Clean", `Complete (${poopGameState.count})`);
      saveSave(save);
    }
  }

  ui.btnPoopExit.addEventListener("click", endPoopGame);

  // ===== 時間計算 =====
  function now(){
    return Date.now();
  }

  function calcElapsedMs(save, tNow){
    if(!save.createdAt) return 0;
    const created = new Date(save.createdAt).getTime();
    const pausedOffset = save.pausedSince ? (now() - save.pausedSince) : 0;
    return tNow - created - pausedOffset;
  }

  // ===== 状態管理 =====
  function isSleeping(save, elapsed){
    if(!save.sleepStartedAt) return false;
    const sleepElapsed = elapsed - save.sleepStartedAt;
    return sleepElapsed < 30000; // 30秒で起きる
  }

  function startSleep(save, elapsed, logText){
    save.sleepStartedAt = elapsed;
    pushLiveLog(save, logText);
  }

  function addChoice(save, category, choice){
    const key = `${save.day}_${category}`;
    if(!save.choices[key]) save.choices[key] = [];
    save.choices[key].push(choice);
  }

  function pushLiveLog(save, text){
    save.events.push({
      t: new Date().toISOString(),
      day: save.day,
      text: text,
    });
  }

  function updateDayBoundary(save, elapsed){
    const currentDay = Math.floor(elapsed / DAY_LENGTH_MS) + 1;
    if(currentDay !== save.day){
      save.day = Math.min(3, currentDay);
      pushLiveLog(save, `Day ${save.day} 開始`);
    }
  }

  function maybeEnd(save, elapsed){
    if(save.heart <= 0 && !save.ended){
      save.ended = true;
      save.endedAt = new Date().toISOString();
      pushLiveLog(save, "お別れの時");
      saveSave(save);
      showEndingChoice(save);
    }
  }

  // ===== 手紙機能 =====
  function getLetterText(){
    return `うちの子へ

3日間、やさしく育ててくれてありがとう。

いま、この子は小さくて弱い存在。
ふ化したばかりだから。

毎日のごはん。
たまのおでかけ。
時々のお化粧。
時々のドリンク。
そして時々のマカロン。

その全部が、この子にとっての
大切な時間になっていくんだと思う。

だからこそ、いまだけは。
やさしく育ててね。

        from 研究者より`;
  }

  function openLetter(){
    ui.letterContent.textContent = getLetterText();
    ui.letterModal.style.display = "grid";
  }

  function closeLetter(){
    ui.letterModal.style.display = "none";
  }

  // ===== 死亡後の同一性選択 =====
  function showEndingChoice(save){
    ui.endingModal.style.display = "grid";
    
    ui.chooseLog.addEventListener("click", () => {
      ui.endingModal.style.display = "none";
      openLogsModal(save);
    }, {once: true});
    
    ui.chooseShape.addEventListener("click", () => {
      ui.endingModal.style.display = "none";
      saveCharacterImage(save);
    }, {once: true});
  }

  function saveCharacterImage(save){
    alert("容姿が記録されました。\n別の実験に進んでください。");
  }

  // ===== アクション =====
  function actFood(){
    const save = loadSave();
    if(!save || save.ended) return;
    
    save.hunger = Math.max(0, save.hunger - 2);
    save.heart = Math.min(10, save.heart + 1);
    pushLiveLog(save, "ごはんを食べた");
    addChoice(save, "Food", "Feed");
    touchAction(save);
    saveSave(save);
  }

  function actOut(){
    const save = loadSave();
    if(!save || save.ended) return;
    
    save.tired = Math.max(0, save.tired - 2);
    save.hunger = Math.min(10, save.hunger + 1);
    save.heart = Math.min(10, save.heart + 1);
    pushLiveLog(save, "おでかけした");
    addChoice(save, "Out", "Play");
    touchAction(save);
    saveSave(save);
  }

  function actStyle(){
    const save = loadSave();
    if(!save || save.ended) return;
    
    save.colorId = (save.colorId + 1) % 4;
    save.heart = Math.min(10, save.heart + 1);
    pushLiveLog(save, "スタイルを変更した");
    addChoice(save, "Style", `Color${save.colorId}`);
    touchAction(save);
    saveSave(save);
  }

  function actDrink(){
    const save = loadSave();
    if(!save || save.ended) return;
    
    save.heart = Math.min(10, save.heart + 2);
    pushLiveLog(save, "ドリンクをあげた");
    addChoice(save, "Drink", "Drink");
    touchAction(save);
    saveSave(save);
  }

  function actMacaron(){
    const save = loadSave();
    if(!save || save.ended) return;
    
    save.heart = Math.min(10, save.heart + 3);
    pushLiveLog(save, "マカロンをあげた");
    addChoice(save, "Macaron", "Give");
    touchAction(save);
    saveSave(save);
  }

  function touchAction(save){
    const tNow = now();
    const elapsed = calcElapsedMs(save, tNow);
    save.lastActionElapsed = elapsed;
    save.sleepStartedAt = null;
  }

  function toggleSitter(){
    const save = loadSave();
    if(!save) return;
    
    if(!save.pausedSince){
      save.pausedSince = now();
      ui.sitterToggle.dataset.on = "true";
      pushLiveLog(save, "シッター開始");
    }else{
      const paused = now() - save.pausedSince;
      save.pausedSince = null;
      ui.sitterToggle.dataset.on = "false";
      pushLiveLog(save, `シッター終了 (${Math.round(paused/1000)}秒)`);
    }
    saveSave(save);
  }

  // ===== UI更新 =====
  function updateHeartDisplay(save){
    const pct = (save.heart / 10) * 100;
    ui.heartFill.style.width = pct + "%";
    ui.heartVal.textContent = `${save.heart}/10`;
    
    const lastHeart = save.heartHistory[save.heartHistory.length - 1];
    if(!lastHeart || lastHeart.v !== save.heart){
      save.heartHistory.push({t: calcElapsedMs(save, now()), v: save.heart});
    }
  }

  function updateCharDisplay(save){
    ui.dayNum.textContent = save.day;
    
    const colors = ["blue", "green", "pink", "purple"];
    const color = colors[save.colorId % 4];
    
    let imgPath = "";
    if(!save.hatched){
      // マカロン（卵）
      ui.macaronWrap.style.display = "grid";
      ui.charWrap.style.display = "none";
      imgPath = `macaron_${color}.png`;
      ui.macaronImg.src = imgPath;
    }else{
      ui.macaronWrap.style.display = "none";
      ui.charWrap.style.display = "grid";
      
      if(isSleeping(save, calcElapsedMs(save, now()))){
        imgPath = `${color}_sleep.png`;
        ui.sleepStatus.textContent = "zzz...";
        ui.sleepStatus.className = "sleepStatus resting";
      }else if(save.dirty > 6){
        imgPath = `${color}_closed.png`;
        ui.sleepStatus.textContent = "困ってる...";
        ui.sleepStatus.className = "sleepStatus tired";
      }else{
        imgPath = `${color}_open.png`;
        ui.sleepStatus.textContent = "";
      }
      ui.charImg.src = imgPath;
    }
    
    const statusTexts = [];
    if(save.hunger > 7) statusTexts.push("お腹すいてる");
    if(save.tired > 7) statusTexts.push("疲れてる");
    if(save.dirty > 5) statusTexts.push("汚れてる");
    if(statusTexts.length === 0) statusTexts.push("元気");
    
    ui.charStatus.textContent = statusTexts.join(" / ");
  }

  function updateCountdownDisplay(save, elapsed){
    const hatchTime = 10000;
    const timeLeft = Math.max(0, hatchTime - elapsed);
    
    if(timeLeft > 0){
      const s = Math.ceil(timeLeft / 1000);
      const m = Math.floor(s / 60);
      const ss = s % 60;
      ui.countdownText.textContent = `あと ${m}:${String(ss).padStart(2,"0")}`;
    }
  }

  function render(save){
    const tNow = now();
    const elapsed = calcElapsedMs(save, tNow);
    
    // 時間シミュレーション
    if(!save.pausedSince && !save.ended){
      const dt = (elapsed - (save.lastSimElapsed || 0)) / 1000;
      save.hunger = Math.min(10, save.hunger + dt * 0.01);
      save.tired = Math.min(10, save.tired + dt * 0.008);
      save.dirty = Math.min(10, save.dirty + dt * 0.005);
      save.heart = Math.max(0, save.heart - dt * 0.002);
    }
    
    if(!save.hatched && elapsed > 10000){
      save.hatched = true;
      pushLiveLog(save, "ふ化した！");
      addChoice(save, "Hatch", "Born");
      
      // ふ化アニメーション処理
      setTimeout(() => {
        ui.macaronImg.classList.add("hatchAnimation");
      }, 100);
      
      setTimeout(() => {
        ui.macaronWrap.style.display = "none";
        ui.charWrap.style.display = "grid";
        ui.charWrap.classList.add("charAppear");
      }, 900);
    }
    
    updateDayBoundary(save, elapsed);
    maybeEnd(save, elapsed);
    updateCountdown(save, elapsed);
    updateHeartDisplay(save);
    updateCharDisplay(save);
    updateCountdownDisplay(save, elapsed);
    
    // 自動スリープ
    if(save.hatched && !isSleeping(save, elapsed)){
      const idle = elapsed - (save.lastActionElapsed || 0);
      if(idle >= IDLE_SLEEP_AFTER_MS){
        startSleep(save, elapsed, "静かだから寝てしまった...");
        save.lastActionElapsed = elapsed;
      }
    }
    
    save.lastSimElapsed = elapsed;
    saveSave(save);
  }

  // ===== ログ表示 =====
  function openLogsModal(save){
    const modal = document.createElement("div");
    modal.className = "modalOverlay";
    
    const box = document.createElement("div");
    box.className = "modalBox";
    
    const title = document.createElement("h2");
    title.textContent = "3日間の記録";
    box.appendChild(title);
    
    const list = document.createElement("div");
    list.style.maxHeight = "400px";
    list.style.overflow = "auto";
    
    const events = (save.events || []).reverse().slice(0, 100);
    for(const e of events){
      const item = document.createElement("div");
      item.style.cssText = "padding:8px; border-bottom:1px solid rgba(255,255,255,.08); font-size:12px;";
      const dt = new Date(e.t);
      const time = dt.toLocaleTimeString("ja-JP");
      item.innerHTML = `<b>${e.text}</b><div style="color:var(--muted); margin-top:2px;">Day ${e.day} / ${time}</div>`;
      list.appendChild(item);
    }
    box.appendChild(list);
    
    const btn = document.createElement("button");
    btn.textContent = "閉じる";
    btn.style.marginTop = "16px";
    btn.style.width = "100%";
    btn.addEventListener("click", () => modal.remove());
    box.appendChild(btn);
    
    modal.appendChild(box);
    document.body.appendChild(modal);
  }

  // ===== イベントリスナー =====
  ui.sitterToggle.addEventListener("click", toggleSitter);
  ui.btnFood.addEventListener("click", actFood);
  ui.btnOut.addEventListener("click", actOut);
  ui.btnStyle.addEventListener("click", actStyle);
  ui.btnClean.addEventListener("click", startPoopGame);
  ui.btnDrink.addEventListener("click", actDrink);
  ui.btnMacaron.addEventListener("click", actMacaron);
  
  ui.btnName.addEventListener("click", () => {
    const newName = prompt("名前を入力してください:");
    if(newName && newName.trim()){
      const save = loadSave();
      if(save){
        save.name = newName.trim();
        pushLiveLog(save, `名前が『${save.name}』に決まった`);
        saveSave(save);
      }
    }
  });
  
  ui.btnReset.addEventListener("click", () => {
    if(confirm("本当にリセットしますか？")){
      localStorage.removeItem(SAVE_KEY);
      location.reload();
    }
  });
  
  ui.btnLogs.addEventListener("click", () => {
    const save = loadSave();
    if(save) openLogsModal(save);
  });

  ui.btnLetter.addEventListener("click", openLetter);
  ui.btnLetterClose.addEventListener("click", closeLetter);

  // ===== 初期化 =====
  initSurveyCheck();
  
  let save = loadSave();
  if(!save){
    save = createNewSave();
    saveSave(save);
  }
  
  ui.sitterToggle.dataset.on = save.pausedSince ? "true" : "false";
  render(save);
  
  // ===== アニメーションループ =====
  function tick(){
    const save = loadSave();
    if(save) render(save);
    requestAnimationFrame(tick);
  }
  
  tick();
})();
</script>
</body>
</html>

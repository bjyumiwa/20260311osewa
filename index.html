<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>3日間のお世話ゲーム</title>
  <style>
    :root{
      --text:#eef2ff;
      --muted:rgba(238,242,255,.72);
      --line:rgba(255,255,255,.14);

      --accent1:#c4b5fd;
      --accent2:#93c5fd;
      --success:#b9f6ca;
      --warn:#ffd6a5;
      --danger:#fda4af;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      background:
        linear-gradient(180deg, rgba(5,8,22,.56), rgba(11,16,40,.76)),
        url("./space_background.png") center/cover fixed no-repeat,
        linear-gradient(180deg,#10162f,#1a2145);
      min-height:100vh;

    }
    .wrap{max-width:1100px;margin:0 auto;padding:18px 14px 40px}
    .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;padding:10px 12px;border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:var(--radius);box-shadow:var(--shadow);position:sticky;top:10px;z-index:20;backdrop-filter:blur(10px)}
    .brand{display:flex;gap:10px;align-items:center}.brand .dot{width:12px;height:12px;border-radius:999px;background:linear-gradient(180deg,var(--accent1),var(--accent2));box-shadow:0 0 18px rgba(196,181,253,.35)}.brand .title{font-weight:800;font-size:14px}.brand .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .statusRow{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex:1;flex-wrap:wrap}
    .pill,.countdown{display:flex;align-items:center;gap:8px;min-height:34px;padding:8px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.05)}
    .countdown{border-color:rgba(147,197,253,.3);background:rgba(147,197,253,.1);font-size:13px;font-weight:700}.countdown .icon{width:16px;height:16px;border-radius:999px;background:linear-gradient(45deg,var(--accent2),var(--accent1));animation:pulse 1.6s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}

    .toggle{cursor:pointer;user-select:none}.switch{width:42px;height:24px;border-radius:999px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);position:relative;transition:.18s ease}.switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:999px;background:rgba(255,255,255,.85);box-shadow:0 8px 14px rgba(0,0,0,.25);transition:.18s ease}.toggle[data-on="true"] .switch{background:rgba(154,230,180,.18);border-color:rgba(154,230,180,.28)}.toggle[data-on="true"] .switch::after{left:20px;background:rgba(154,230,180,.95)}
    .main{margin-top:14px;display:grid;grid-template-columns:1.45fr 1fr;gap:14px;align-items:start}@media (max-width:900px){.main{grid-template-columns:1fr}}
    .card{border:1px solid var(--line);background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.cardHeader{padding:12px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.cardHeader .h{font-weight:800;font-size:14px}.cardHeader .hint{font-size:12px;color:var(--muted);margin-top:2px}.cardContent{padding:12px}
    button{appearance:none;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:var(--text);border-radius:14px;padding:12px 10px;cursor:pointer;font-weight:700;letter-spacing:.01em;box-shadow:0 12px 26px rgba(0,0,0,.22);transition:transform .08s ease, background .18s ease, border-color .18s ease, opacity .18s ease}
    button:hover{transform:translateY(-1px);background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.22)}button:active{transform:translateY(0) scale(.99)}button[disabled]{opacity:.45;cursor:not-allowed;transform:none}.btnGhost{background:rgba(255,255,255,.03)}
    .choiceGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0}.choiceBtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:86px;padding:16px 12px!important;border-radius:16px;background:rgba(255,255,255,.06)!important;border:1.5px solid rgba(255,255,255,.14)!important}.choiceBtn .icon{font-size:32px;line-height:1}.choiceBtn .label{font-size:13px;font-weight:800;text-align:center;line-height:1.3}.choiceBtn .sub{font-size:11px;color:var(--muted);text-align:center}
    .stage{position:relative;min-height:560px;padding:14px;overflow:hidden}.stage::before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(0,0,0,.06)), radial-gradient(1000px 500px at 50% 100%, rgba(147,197,253,.06), transparent 60%)}
    .center{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);width:100%;max-width:560px;display:flex;flex-direction:column;align-items:center;gap:12px;padding:12px;z-index:10}
    .entity{width:320px;height:320px;display:grid;place-items:center;position:relative}.entity.floaty{animation:floaty 2.8s ease-in-out infinite}@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}.entity.crying{animation:cryFloat 1.2s ease-in-out infinite}@keyframes cryFloat{0%,100%{transform:translateY(0)}25%{transform:translate(-2px,-5px)}50%{transform:translate(2px,-8px)}75%{transform:translate(-1px,-4px)}}
    .entityBubble{position:absolute;top:6px;right:6px;padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-size:12px;color:var(--muted);backdrop-filter:blur(8px);z-index:3}
    .entityImgWrap{position:relative;display:grid;place-items:center}.entityImg{width:280px;height:280px;object-fit:contain;filter:drop-shadow(0 18px 26px rgba(0,0,0,.35));transition:transform .25s ease, filter .25s ease}.entityImg.stage1{transform:scale(.88)}.entityImg.stage2{transform:scale(1)}.entityImg.stage3{transform:scale(1.1);filter:drop-shadow(0 18px 26px rgba(0,0,0,.35)) drop-shadow(0 0 18px rgba(255,255,255,.12))}
    .tears{position:absolute;inset:0;pointer-events:none;display:none}.tears.show{display:block}.tear{position:absolute;width:10px;height:18px;background:linear-gradient(180deg,rgba(196,240,255,.95),rgba(88,179,255,.65));border-radius:50% 50% 60% 60%;filter:drop-shadow(0 0 5px rgba(120,200,255,.35));animation:tearDrop 1.1s ease-in-out infinite}.tear.left{left:110px;top:138px}.tear.right{left:164px;top:140px;animation-delay:.2s}@keyframes tearDrop{0%{transform:translateY(0) scale(.9);opacity:0}20%{opacity:1}70%{opacity:1}100%{transform:translateY(26px) scale(1);opacity:0}}
    .sleepStatus{position:absolute;bottom:-44px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--muted);white-space:nowrap}.progressNote{margin-top:8px;font-size:12px;color:var(--muted)}
    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:rgba(11,16,40,.92);color:var(--text);box-shadow:var(--shadow);z-index:110;display:none}.toast.show{display:block;animation:toastIn .25s ease}@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .modalOverlay,.surveyGate,.poopGameContainer,.endingScreen{position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(4px);display:none;place-items:center;z-index:100}.modalOverlay.show,.surveyGate.show,.endingScreen.show{display:grid}.poopGameContainer.show{display:flex}
    .modalBox{background:rgba(11,16,40,.96);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:24px;max-width:560px;width:min(92vw,560px);max-height:84vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}.modalBox h2{margin:0 0 8px;font-size:18px}.modalBox p,.modalBox small{color:var(--muted);line-height:1.7}.modalBtn{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.modalBtn button{flex:1;min-width:140px}
    .pairCard{margin-top:12px;padding:14px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)}.pairProgress{font-size:12px;color:var(--muted);margin-bottom:8px}.pairTitle{font-size:16px;font-weight:800;margin-bottom:12px}.pairBtns{display:grid;grid-template-columns:1fr 1fr;gap:10px}.choiceModalBtn{min-height:86px;display:flex;align-items:center;justify-content:center;font-size:16px}.historyHint{font-size:12px;color:var(--muted);margin-top:12px}
    .poopGameContainer{flex-direction:column;align-items:center;justify-content:center;gap:20px;background:linear-gradient(135deg, rgba(5,8,22,.98), rgba(11,16,40,.98));z-index:120}.poopGameTitle{font-size:32px;font-weight:900}.poopGameArea{width:320px;height:320px;border:2px solid rgba(255,255,255,.2);border-radius:20px;background:rgba(255,255,255,.03);position:relative;overflow:hidden}.poop{position:absolute;width:42px;height:42px;display:grid;place-items:center;font-size:28px;cursor:pointer;user-select:none;animation:poopBounce .6s ease-out}@keyframes poopBounce{0%{transform:scale(0);opacity:1}50%{transform:scale(1.1)}100%{transform:scale(1)}}.poop:hover{transform:scale(1.14)}.poopScore{font-size:24px;font-weight:800}.poopHint{font-size:12px;color:var(--muted)}
    .surveyGate{background:linear-gradient(135deg, rgba(5,8,22,.98), rgba(11,16,40,.98));z-index:90}.surveyPanel{width:min(92vw,520px);padding:28px;border-radius:24px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);text-align:center;box-shadow:var(--shadow)}.surveyPanel .icon{font-size:58px;margin-bottom:10px;animation:bounce 1.2s ease infinite}@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}.surveyPanel .title{font-size:24px;font-weight:900;margin-bottom:10px}.surveyPanel .desc{color:var(--muted);line-height:1.7;margin-bottom:18px}
    .endingScreen .thanks{font-size:42px;font-weight:900;letter-spacing:.08em}.endingScreen .sub{margin-top:12px;color:var(--muted);text-align:center;line-height:1.8}.logList{display:flex;flex-direction:column;gap:12px}.logDay{padding:12px;border:1px solid rgba(255,255,255,.1);border-radius:14px;background:rgba(255,255,255,.03)}.logDay h3{margin:0 0 8px;font-size:14px}.logDay ul{margin:0;padding-left:18px;color:var(--muted);line-height:1.7}
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><div class="dot"></div><div><div class="title">お世話ゲーム</div><div class="sub">Day <span id="dayNum">1</span> / 3</div></div></div>
    <div class="statusRow">
      <div class="countdown"><span class="icon"></span><span id="countdownText">計測中...</span></div>
      <div class="pill"><span class="heartIcon">💗</span><div class="hearts"><i id="heartFill"></i></div><small id="heartVal">?/10</small></div>
      <div class="pill toggle" id="sitterToggle" data-on="false"><small>シッター</small><div class="switch"></div></div>
    </div>
  </div>
  <div class="main">
    <div class="card">
      <div class="cardHeader"><div><div class="h">キャラ</div><div class="hint" id="charStatus">準備中...</div></div></div>
      <div class="cardContent" style="position:relative; min-height:560px; padding:0;">
        <div class="stage"><div class="center"><div class="entity floaty" id="entityBox"><div class="entityBubble" id="entityBubble">まってる</div><div class="entityImgWrap"><img id="entityImg" class="entityImg stage1" alt="character"><div class="tears" id="tears"><div class="tear left"></div><div class="tear right"></div></div></div><div class="sleepStatus" id="sleepStatus"></div></div></div></div>
      </div>
    </div>
    <div class="card">
      <div class="cardHeader"><div><div class="h">コマンド</div><div class="hint">10回ごとに少し育ちます。夜は眠ります。</div></div><button style="width:auto; padding:8px 10px; font-size:11px;" id="btnLetter">💌 手紙を読む</button></div>
      <div class="cardContent">
        <div style="display:flex; flex-direction:column; gap:8px;">
          <div><small style="color:var(--muted); display:block; margin-bottom:4px;">ごはん</small><div class="choiceGrid"><button class="choiceBtn" id="btnFood"><span class="icon">🍚</span><span class="label">ごはん</span><span class="sub">20この2たく</span></button><button class="choiceBtn" id="btnOut"><span class="icon">🌳</span><span class="label">おでかけ</span><span class="sub">2たく</span></button></div></div>
          <div><small style="color:var(--muted); display:block; margin-bottom:4px;">遊び</small><div class="choiceGrid"><button class="choiceBtn" id="btnStyle"><span class="icon">✨</span><span class="label">スタイル</span><span class="sub">2たく</span></button><button class="choiceBtn" id="btnDrink"><span class="icon">🧃</span><span class="label">ドリンク</span><span class="sub">少し元気</span></button></div></div>
          <div><small style="color:var(--muted); display:block; margin-bottom:4px;">ケア</small><div class="choiceGrid"><button class="choiceBtn" id="btnClean"><span class="icon">🧹</span><span class="label">そうじ</span><span class="sub">💩ゲーム</span></button><button class="choiceBtn" id="btnMacaron"><span class="icon">🍪</span><span class="label">マカロン</span><span class="sub">少し回復</span></button></div></div>
        </div>
        <div class="progressNote" id="growthText">選択 0回 / 10回で少し変化</div>
        <hr style="border:0; border-top:1px solid rgba(255,255,255,.08); margin:12px 0;">
        <div style="display:flex; flex-direction:column; gap:8px;"><button style="width:100%;" id="btnName">名前を決める</button><button style="width:100%;" class="btnGhost" id="btnLogs">📊 ログ</button><button style="width:100%;" class="btnGhost" id="btnReset">🔄 リセット</button></div>
      </div>
    </div>
  </div>
</div>
<div class="surveyGate" id="surveyGate"><div class="surveyPanel"><div class="icon">📋</div><div class="title">ゲーム開始前に</div><div class="desc">最初にアンケートへ進みます。<br>送信後に戻ると、このままゲームが始まります。</div><button id="btnGoSurvey" style="width:100%; margin-bottom:10px;">アンケートへ進む</button><button id="btnSkipSurvey" class="btnGhost" style="width:100%;">開発用にスキップ</button></div></div>
<div class="modalOverlay" id="choiceModal"><div class="modalBox"><h2 id="choiceModalTitle">2択</h2><small id="choiceModalDesc">どちらかを選ぶ</small><div class="pairCard"><div class="pairProgress" id="choiceProgress">1 / 20</div><div class="pairTitle" id="choiceQuestion">どっちにする？</div><div class="pairBtns"><button class="choiceModalBtn" id="choiceLeft">左</button><button class="choiceModalBtn" id="choiceRight">右</button></div></div><div class="historyHint" id="choiceHint">選ぶたびに次の2択へ進みます。</div><div class="modalBtn"><button class="btnGhost" id="btnChoiceClose">閉じる</button></div></div></div>
<div class="modalOverlay" id="letterModal"><div class="modalBox"><h2>💌 お手紙</h2><div style="background:rgba(255,255,255,.05); border-radius:12px; padding:16px; margin:16px 0; line-height:1.8; white-space:pre-wrap; font-size:13px; color:var(--muted);" id="letterContent"></div><button style="width:100%; margin-top:16px;" id="btnLetterClose">手紙を閉じる</button></div></div>
<div class="modalOverlay" id="logsModal"><div class="modalBox"><h2>3日間の記録</h2><div class="logList" id="logsContent"></div><div class="modalBtn"><button id="btnLogsClose">閉じる</button></div></div></div>
<div class="poopGameContainer" id="poopGame"><div class="poopGameTitle">そうじ</div><div class="poopGameArea" id="poopGameArea"></div><div class="poopScore" id="poopScore">0 / 5</div><div class="poopHint">💩をタップしてきれいにしよう</div><button id="btnPoopExit">終わる</button></div>
<div class="endingScreen" id="endingScreen"><div class="modalBox" style="text-align:center;"><div class="thanks">ありがとう</div><div class="sub">3日間の記録だけが、静かに残ります。</div><div class="modalBtn"><button id="btnEndingLogs">ログを見る</button><button class="btnGhost" id="btnEndingClose">閉じる</button></div></div></div>
<div class="toast" id="toast"></div>
<script>
(() => {
  "use strict";
  const SAVE_KEY = "tosewa_save_v3";
  const GIFT_SURVEY_DONE_KEY = "gift_survey_done";
  const OSEWA_SURVEY_DONE_KEY = "osewa_survey_done_v1";
  const HATCH_MS = 10000;
  const DAY_LENGTH_MS = 3600000;
  const TOTAL_DAYS = 3;
  const IDLE_SLEEP_AFTER_MS = 120000;
  const SLEEP_MS = 30000;
  const POOP_COUNT_TARGET = 5;
  const COLORS = ["blue", "green", "pink", "purple"];
  const ASSETS = {blue:{macaron:"./macaron_blue.png",open:"./blue_open.png",sick:"./blue_closed.png",sleep:"./blue_sleep.png",openFallback:"./blue_sleep.png",sickFallback:"./blue_sleep.png"},green:{macaron:"./macaron_green.png",open:"./green_open.png",sick:"./green_closed.png",sleep:"./green_sleep.png"},pink:{macaron:"./macaron_pink.png",open:"./pink_open.png",sick:"./pink_closed.png",sleep:"./pink_sleep.png"},purple:{macaron:"./macaron_purple.png",open:"./purple_open.png",sick:"./purple_closed.png",sleep:"./purple_sleep.png",sleepFallback:"./purple_sleep .png"}};
  const FOOD_CHOICES=[["ごはん","パン"],["みそしる","スープ"],["りんご","バナナ"],["おにぎり","サンドイッチ"],["おちゃ","ジュース"],["うどん","パスタ"],["いちご","ぶどう"],["クッキー","ビスケット"],["オムライス","カレー"],["プリン","ゼリー"],["コーンスープ","ポタージュ"],["ミルク","ヨーグルト"],["さかな","おにく"],["たまごやき","ハム"],["チーズ","バター"],["ホットケーキ","ワッフル"],["マカロン","マシュマロ"],["トマト","にんじん"],["ラーメン","やきそば"],["おもち","どらやき"]];
  const OUT_CHOICES=[["外に出る","家で過ごす"],["星を見る","音を聞く"],["さんぽ","ごろごろ"],["ひなたぼっこ","日かげで休む"],["遠くへ行く","近くで遊ぶ"],["ひとりで歩く","いっしょに歩く"]];
  const STYLE_CHOICES=[["ぼうし","りぼん"],["キラキラ","ふわふわ"],["青い飾り","紫の飾り"],["ほし模様","月模様"],["まるい感じ","すっとした感じ"],["やわらかい光","つよい光"]];
  const ui={dayNum:document.getElementById("dayNum"),countdownText:document.getElementById("countdownText"),heartFill:document.getElementById("heartFill"),heartVal:document.getElementById("heartVal"),sitterToggle:document.getElementById("sitterToggle"),charStatus:document.getElementById("charStatus"),entityBox:document.getElementById("entityBox"),entityImg:document.getElementById("entityImg"),entityBubble:document.getElementById("entityBubble"),sleepStatus:document.getElementById("sleepStatus"),tears:document.getElementById("tears"),growthText:document.getElementById("growthText"),btnFood:document.getElementById("btnFood"),btnOut:document.getElementById("btnOut"),btnStyle:document.getElementById("btnStyle"),btnClean:document.getElementById("btnClean"),btnDrink:document.getElementById("btnDrink"),btnMacaron:document.getElementById("btnMacaron"),btnName:document.getElementById("btnName"),btnReset:document.getElementById("btnReset"),btnLogs:document.getElementById("btnLogs"),surveyGate:document.getElementById("surveyGate"),btnGoSurvey:document.getElementById("btnGoSurvey"),btnSkipSurvey:document.getElementById("btnSkipSurvey"),choiceModal:document.getElementById("choiceModal"),choiceModalTitle:document.getElementById("choiceModalTitle"),choiceModalDesc:document.getElementById("choiceModalDesc"),choiceProgress:document.getElementById("choiceProgress"),choiceQuestion:document.getElementById("choiceQuestion"),choiceLeft:document.getElementById("choiceLeft"),choiceRight:document.getElementById("choiceRight"),btnChoiceClose:document.getElementById("btnChoiceClose"),choiceHint:document.getElementById("choiceHint"),letterModal:document.getElementById("letterModal"),letterContent:document.getElementById("letterContent"),btnLetter:document.getElementById("btnLetter"),btnLetterClose:document.getElementById("btnLetterClose"),logsModal:document.getElementById("logsModal"),logsContent:document.getElementById("logsContent"),btnLogsClose:document.getElementById("btnLogsClose"),poopGame:document.getElementById("poopGame"),poopGameArea:document.getElementById("poopGameArea"),poopScore:document.getElementById("poopScore"),btnPoopExit:document.getElementById("btnPoopExit"),endingScreen:document.getElementById("endingScreen"),btnEndingLogs:document.getElementById("btnEndingLogs"),btnEndingClose:document.getElementById("btnEndingClose"),toast:document.getElementById("toast")};
  let poopGameState={count:0,target:POOP_COUNT_TARGET}; let currentChoiceContext=null; let currentImgToken=0;
  const randomColor=()=>COLORS[Math.floor(Math.random()*COLORS.length)];
  function createNewSave(){return {v:3,createdAt:new Date().toISOString(),ended:false,endedAt:null,hatched:false,color:randomColor(),name:"???",heart:5,hunger:4,tired:2,dirty:1,mood:0,day:1,totalChoices:0,lastGrowthStage:0,cursors:{food:0,out:0,style:0},choices:{},events:[],heartHistory:[{t:0,v:5}],lastActionElapsed:0,sleepStartedAt:null,pauseAccumMs:0,pausedSince:null,lastSimElapsed:0};}
  function loadSave(){try{const raw=localStorage.getItem(SAVE_KEY);return raw?JSON.parse(raw):null;}catch(_){return null;}}
  function saveSave(save){try{localStorage.setItem(SAVE_KEY,JSON.stringify(save));}catch(_){}}
  const now=()=>Date.now();
  function calcElapsedMs(save, atNow=now()){const created=new Date(save.createdAt).getTime();const currentPause=save.pausedSince?(atNow-save.pausedSince):0;return Math.max(0, atNow-created-(save.pauseAccumMs||0)-currentPause);}
  function isSurveyDone(){return localStorage.getItem(GIFT_SURVEY_DONE_KEY)==="1"||localStorage.getItem(OSEWA_SURVEY_DONE_KEY)==="1";}
  function initSurveyGate(){if(isSurveyDone()) ui.surveyGate.classList.remove("show"); else ui.surveyGate.classList.add("show");}
  function showToast(message){ui.toast.textContent=message;ui.toast.classList.add("show");clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>ui.toast.classList.remove("show"),2200);}
  function touchAction(save){save.lastActionElapsed=calcElapsedMs(save);save.sleepStartedAt=null;}
  function pushLiveLog(save,text){save.events.push({t:new Date().toISOString(),day:save.day,text});}
  function addChoice(save,category,text){const key=`day${save.day}_${category}`; if(!save.choices[key]) save.choices[key]=[]; save.choices[key].push(text);}
  const round1=v=>Math.round(v*10)/10; const clamp=(v,min,max)=>Math.min(max,Math.max(min,v));
  function recordHeart(save){const elapsed=calcElapsedMs(save);const last=save.heartHistory[save.heartHistory.length-1];if(!last||last.v!==save.heart) save.heartHistory.push({t:elapsed,v:round1(save.heart)});}
  function isNightNow(){const h=new Date().getHours(); return h>=21||h<6;}
  function isSleeping(save, elapsed){return !!save.sleepStartedAt && (elapsed-save.sleepStartedAt)<SLEEP_MS;}
  function isSick(save){return save.heart<3||save.hunger>7||save.dirty>6||save.tired>7;}
  function getGrowthStage(save){return Math.min(3, Math.floor(save.totalChoices/10)+1);}
  function maybeGrowthNotice(save){const stage=Math.floor(save.totalChoices/10); if(stage>save.lastGrowthStage){save.lastGrowthStage=stage; pushLiveLog(save, `${stage*10}回の選択で少し変わった`); showToast("少し育ったみたいです。");}}
  function updateDayBoundary(save, elapsed){const nextDay=Math.min(TOTAL_DAYS,Math.floor(elapsed/DAY_LENGTH_MS)+1); if(nextDay!==save.day){save.day=nextDay; pushLiveLog(save, `Day ${save.day} 開始`);}}
  function maybeEnd(save, elapsed){if(save.ended) return; const finishedTime=elapsed>=DAY_LENGTH_MS*TOTAL_DAYS; const noHeart=save.heart<=0; if(finishedTime||noHeart){save.ended=true; save.endedAt=new Date().toISOString(); save.heart=Math.max(0, round1(save.heart)); pushLiveLog(save,"ありがとう"); saveSave(save); ui.endingScreen.classList.add("show");}}
  function applyPassiveChange(save, elapsed){if(save.pausedSince||save.ended) return; const prev=save.lastSimElapsed||0; const dt=Math.max(0, elapsed-prev)/1000; if(!dt) return; save.hunger=Math.min(10,save.hunger+dt*0.012); save.tired=Math.min(10,save.tired+dt*0.010); save.dirty=Math.min(10,save.dirty+dt*0.008); save.heart=Math.max(0,save.heart-dt*0.0025); save.lastSimElapsed=elapsed;}
  function hatchIfNeeded(save, elapsed){if(!save.hatched&&elapsed>=HATCH_MS){save.hatched=true; pushLiveLog(save, `${save.color} のマカロンから生まれた`); showToast("ふわっと生まれました。");}}
  function maybeAutoSleep(save, elapsed){if(!save.hatched||save.ended||save.pausedSince||isSleeping(save,elapsed)||isNightNow()) return; const idle=elapsed-(save.lastActionElapsed||0); if(idle>=IDLE_SLEEP_AFTER_MS){save.sleepStartedAt=elapsed; pushLiveLog(save,"静かだから寝てしまった"); save.lastActionElapsed=elapsed;}}
  function setImageWithFallback(list){const token=++currentImgToken; const candidates=list.filter(Boolean); let idx=0; function tryNext(){if(token!==currentImgToken) return; if(idx>=candidates.length){ui.entityImg.onerror=null; return;} ui.entityImg.onerror=tryNext; ui.entityImg.src=candidates[idx++];} tryNext();}
  function getVisualMode(save, elapsed){if(!save.hatched) return "macaron"; if(isNightNow()||isSleeping(save,elapsed)) return "sleep"; if(isSick(save)) return "sick"; return "open";}
  function updateEntityDisplay(save){const elapsed=calcElapsedMs(save); const mode=getVisualMode(save,elapsed); const asset=ASSETS[save.color]||ASSETS.blue; if(mode==="macaron"){setImageWithFallback([asset.macaron]); ui.entityBubble.textContent="どんな子かな？ ちょっと待ってね"; ui.sleepStatus.textContent=""; ui.charStatus.textContent="マカロンが静かに浮かんでいる"; ui.tears.classList.remove("show"); ui.entityBox.classList.remove("crying");} else if(mode==="sleep"){setImageWithFallback([asset.sleep,asset.sleepFallback,asset.open,asset.openFallback]); ui.entityBubble.textContent=isNightNow()?"夜だからおやすみ":"すやすや"; ui.sleepStatus.textContent="zzz..."; ui.charStatus.textContent="眠っている"; ui.tears.classList.remove("show"); ui.entityBox.classList.remove("crying");} else if(mode==="sick"){setImageWithFallback([asset.sick,asset.sickFallback,asset.open,asset.openFallback,asset.sleep]); ui.entityBubble.textContent="..."; ui.sleepStatus.textContent=""; ui.charStatus.textContent="少しつらそう"; ui.tears.classList.add("show"); ui.entityBox.classList.add("crying");} else {setImageWithFallback([asset.open,asset.openFallback,asset.sleep]); ui.entityBubble.textContent=save.name==="???"?"こんにちは":save.name; ui.sleepStatus.textContent=""; ui.charStatus.textContent="いっしょにいる"; ui.tears.classList.remove("show"); ui.entityBox.classList.remove("crying");}
    ui.entityImg.classList.remove("stage1","stage2","stage3"); ui.entityImg.classList.add(`stage${getGrowthStage(save)}`); const states=[]; if(save.hunger>7) states.push("おなかがすいていそう"); if(save.tired>7) states.push("少しつかれていそう"); if(save.dirty>6) states.push("そろそろそうじしたいかも"); if(isNightNow()&&save.hatched) states.push("夜なので眠る"); if(mode!=="macaron"&&states.length) ui.charStatus.textContent=states.join(" / ");}
  function updateHeartDisplay(save){const pct=Math.max(0,Math.min(100,save.heart/10*100)); ui.heartFill.style.width=pct+"%"; ui.heartVal.textContent=`${round1(save.heart)}/10`; recordHeart(save);}
  function updateCountdownText(save, elapsed){if(save.ended){ui.countdownText.textContent="記録のみ"; return;} if(!save.hatched){const left=Math.max(0,HATCH_MS-elapsed); ui.countdownText.textContent=`ふかまで ${Math.ceil(left/1000)}秒`; return;} const day=Math.min(TOTAL_DAYS,Math.floor(elapsed/DAY_LENGTH_MS)+1); const left=Math.max(0,DAY_LENGTH_MS*TOTAL_DAYS-elapsed); const mm=Math.floor((left%DAY_LENGTH_MS)/60000); const ss=Math.floor((left%60000)/1000); ui.countdownText.textContent=`Day ${day} の途中 ${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;}
  function updateGrowthText(save){const next=(Math.floor(save.totalChoices/10)+1)*10; ui.growthText.textContent=`選択 ${save.totalChoices}回 / ${next}回で少し変化`;}
  function openChoiceModal(kind){const save=loadSave(); if(!save||save.ended||!save.hatched) return; let list=[], cursorKey="food", title="2択", desc="どちらかを選ぶ"; if(kind==="food"){list=FOOD_CHOICES; title="ごはん"; desc="ごはんボタンを押すたびに、20この2択が順番に出ます。";} else if(kind==="out"){list=OUT_CHOICES; cursorKey="out"; title="おでかけ"; desc="その日の気分で選ぶ。";} else {list=STYLE_CHOICES; cursorKey="style"; title="スタイル"; desc="見た目の変化に、正解はありません。";} const index=save.cursors[cursorKey]%list.length; const pair=list[index]; currentChoiceContext={kind,cursorKey,index,pair}; ui.choiceModalTitle.textContent=title; ui.choiceModalDesc.textContent=desc; ui.choiceProgress.textContent=`${index+1} / ${list.length}`; ui.choiceQuestion.textContent=`${pair[0]} にする？ それとも ${pair[1]}？`; ui.choiceLeft.textContent=pair[0]; ui.choiceRight.textContent=pair[1]; ui.choiceHint.textContent=kind==="food"?"選ぶと次回は次の2択が出ます。":"選ぶと記録に残ります。"; ui.choiceModal.classList.add("show");}
  function closeChoiceModal(){ui.choiceModal.classList.remove("show"); currentChoiceContext=null;}
  function hiddenDelta(kind, index, side){const seed=((index+1)*(side+2)+kind.length)%5; if(kind==="food"){return [{heart:.8,hunger:-2.2,tired:.2},{heart:.5,hunger:-1.7,dirty:.1},{heart:.9,hunger:-1.9,tired:-.2},{heart:.3,hunger:-2.4,dirty:.2},{heart:.6,hunger:-1.8,mood:.4}][seed];} if(kind==="out"){return [{heart:.8,tired:.6,hunger:.4},{heart:.4,tired:-.6,hunger:.1},{heart:.7,tired:.2,dirty:.5},{heart:.5,tired:-.2,mood:.5},{heart:.6,hunger:.3,mood:.2}][seed];} return [{heart:.8,mood:.6},{heart:.5,mood:.3},{heart:.7,tired:-.2},{heart:.4,dirty:-.1},{heart:.6,mood:.4}][seed];}
  function applyDelta(save, delta){save.heart=clamp(save.heart+(delta.heart||0),0,10); save.hunger=clamp(save.hunger+(delta.hunger||0),0,10); save.tired=clamp(save.tired+(delta.tired||0),0,10); save.dirty=clamp(save.dirty+(delta.dirty||0),0,10); save.mood=clamp(save.mood+(delta.mood||0),-10,10);}
  function selectCurrentChoice(side){if(!currentChoiceContext) return; const save=loadSave(); if(!save||save.ended) return; const {kind,cursorKey,index,pair}=currentChoiceContext; const selected=pair[side]; applyDelta(save,hiddenDelta(kind,index,side)); save.cursors[cursorKey]+=1; save.totalChoices+=1; maybeGrowthNotice(save); touchAction(save); const label=`${pair[0]} / ${pair[1]} → ${selected}`; if(kind==="food"){pushLiveLog(save,`ごはんで「${selected}」を選んだ`); addChoice(save,"Food",label); showToast(`今日は「${selected}」にしました。`);} else if(kind==="out"){pushLiveLog(save,`おでかけで「${selected}」を選んだ`); addChoice(save,"Out",label); showToast(`「${selected}」を選びました。`);} else {pushLiveLog(save,`スタイルで「${selected}」を選んだ`); addChoice(save,"Style",label); showToast(`「${selected}」にしてみました。`);} saveSave(save); closeChoiceModal();}
  function actDrink(){const save=loadSave(); if(!save||save.ended||!save.hatched) return; save.heart=clamp(save.heart+1.2,0,10); save.tired=clamp(save.tired-1.2,0,10); touchAction(save); save.totalChoices+=1; maybeGrowthNotice(save); pushLiveLog(save,"ドリンクをあげた"); addChoice(save,"Drink","Drink"); saveSave(save); showToast("少し元気になったみたいです。");}
  function actMacaron(){const save=loadSave(); if(!save||save.ended||!save.hatched) return; save.heart=clamp(save.heart+1.8,0,10); save.hunger=clamp(save.hunger-.8,0,10); touchAction(save); save.totalChoices+=1; maybeGrowthNotice(save); pushLiveLog(save,"マカロンをあげた"); addChoice(save,"Macaron","Give"); saveSave(save); showToast("甘い時間が過ぎました。");}
  function startPoopGame(){const save=loadSave(); if(!save||save.ended||!save.hatched) return; ui.poopGame.classList.add("show"); poopGameState={count:0,target:POOP_COUNT_TARGET}; ui.poopGameArea.innerHTML=""; updatePoopScore(); spawnPoops();}
  function spawnPoops(){const area=ui.poopGameArea,w=area.clientWidth,h=area.clientHeight; for(let i=0;i<3;i++){setTimeout(()=>{if(!ui.poopGame.classList.contains("show")||poopGameState.count>=poopGameState.target) return; const poop=document.createElement("div"); poop.className="poop"; poop.textContent="💩"; poop.style.left=Math.random()*(w-42)+"px"; poop.style.top=Math.random()*(h-42)+"px"; poop.addEventListener("click",()=>{poopGameState.count+=1; updatePoopScore(); poop.remove(); if(poopGameState.count>=poopGameState.target) setTimeout(endPoopGame,250); else setTimeout(spawnPoops,240);},{once:true}); area.appendChild(poop);},i*260);}}
  const updatePoopScore=()=>ui.poopScore.textContent=`${poopGameState.count} / ${poopGameState.target}`;
  function endPoopGame(){if(!ui.poopGame.classList.contains("show")) return; ui.poopGame.classList.remove("show"); ui.poopGameArea.innerHTML=""; const save=loadSave(); if(!save||save.ended) return; if(poopGameState.count>0){save.dirty=clamp(save.dirty-3,0,10); save.heart=clamp(save.heart+.8,0,10); touchAction(save); save.totalChoices+=1; maybeGrowthNotice(save); pushLiveLog(save,"そうじをした"); addChoice(save,"Clean",`Complete (${poopGameState.count})`); saveSave(save); showToast("きれいになりました。");}}
  function openLetter(){ui.letterContent.textContent=`見つけてくれたあなたへ\n\n最初に浮かぶのはマカロンです。\n生まれると、その色の子になります。\n\n10回、20回と選ぶたびに、\n少しずつこの子の雰囲気が変わっていきます。\n\n夜になると眠ります。\n具合が悪いと、少し泣いてしまいます。\n\n正しい育て方はありません。\nあるのは、あなたが選んだことと、残る記録だけです。\n\nどうか、3日間よろしくね。`; ui.letterModal.classList.add("show");}
  const closeLetter=()=>ui.letterModal.classList.remove("show");
  function buildDayLogs(save){const result=[]; for(let day=1;day<=TOTAL_DAYS;day++){const items=[]; const dayEvents=(save.events||[]).filter(e=>e.day===day).map(e=>e.text); const food=save.choices[`day${day}_Food`]||[]; const out=save.choices[`day${day}_Out`]||[]; const style=save.choices[`day${day}_Style`]||[]; const clean=save.choices[`day${day}_Clean`]||[]; const drink=save.choices[`day${day}_Drink`]||[]; const macaron=save.choices[`day${day}_Macaron`]||[]; items.push(`ハートの最後: ${round1(getDayHeart(save,day))}`); if(food.length) items.push(`ごはん: ${food.join(" / ")}`); if(out.length) items.push(`おでかけ: ${out.join(" / ")}`); if(style.length) items.push(`スタイル: ${style.join(" / ")}`); if(clean.length) items.push(`そうじ: ${clean.join(" / ")}`); if(drink.length) items.push(`ドリンク: ${drink.length}回`); if(macaron.length) items.push(`マカロン: ${macaron.length}回`); if(dayEvents.length) items.push(...dayEvents); if(!items.length) items.push("まだ記録がありません。"); result.push({day,items});} return result;}
  function getDayHeart(save, day){const upper=day*DAY_LENGTH_MS; const candidates=(save.heartHistory||[]).filter(h=>h.t<=upper); return candidates.length?candidates[candidates.length-1].v:save.heart;}
  function escapeHtml(str){return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");}
  function openLogs(){const save=loadSave(); if(!save) return; const groups=buildDayLogs(save); ui.logsContent.innerHTML=groups.map(group=>`<div class="logDay"><h3>Day ${group.day}</h3><ul>${group.items.map(item=>`<li>${escapeHtml(item)}</li>`).join("")}</ul></div>`).join(""); ui.logsModal.classList.add("show");}
  const closeLogs=()=>ui.logsModal.classList.remove("show");
  function toggleSitter(){const save=loadSave(); if(!save||save.ended) return; if(!save.pausedSince){save.pausedSince=now(); pushLiveLog(save,"シッター開始"); showToast("シッターが見てくれます。");} else {const paused=now()-save.pausedSince; save.pauseAccumMs+=paused; save.pausedSince=null; pushLiveLog(save,`シッター終了 (${Math.round(paused/1000)}秒)`); showToast("また時間が動きはじめます。");} saveSave(save); ui.sitterToggle.dataset.on=save.pausedSince?"true":"false";}
  function changeName(){const save=loadSave(); if(!save||save.ended) return; const newName=prompt("名前を入力してください:", save.name==="???"?"":save.name); if(!newName||!newName.trim()) return; save.name=newName.trim(); pushLiveLog(save,`名前が「${save.name}」に決まった`); saveSave(save); showToast(`「${save.name}」になりました。`);}
  function resetGame(){if(!confirm("本当にリセットしますか？")) return; localStorage.removeItem(SAVE_KEY); location.reload();}
  function render(){const save=loadSave(); if(!save) return; const elapsed=calcElapsedMs(save); applyPassiveChange(save,elapsed); hatchIfNeeded(save,elapsed); updateDayBoundary(save,elapsed); maybeAutoSleep(save,elapsed); maybeEnd(save,elapsed); ui.dayNum.textContent=save.day; ui.sitterToggle.dataset.on=save.pausedSince?"true":"false"; updateHeartDisplay(save); updateCountdownText(save,elapsed); updateEntityDisplay(save); updateGrowthText(save); disableActions(save.ended); saveSave(save);}
  function disableActions(disabled){[ui.btnFood,ui.btnOut,ui.btnStyle,ui.btnClean,ui.btnDrink,ui.btnMacaron,ui.btnName].forEach(btn=>btn.disabled=disabled); if(disabled) ui.charStatus.textContent="記録だけが残っている";}
  ui.btnGoSurvey.addEventListener("click",()=>location.href="./survey.html"); ui.btnSkipSurvey.addEventListener("click",()=>ui.surveyGate.classList.remove("show")); ui.btnFood.addEventListener("click",()=>openChoiceModal("food")); ui.btnOut.addEventListener("click",()=>openChoiceModal("out")); ui.btnStyle.addEventListener("click",()=>openChoiceModal("style")); ui.btnDrink.addEventListener("click",actDrink); ui.btnMacaron.addEventListener("click",actMacaron); ui.btnClean.addEventListener("click",startPoopGame); ui.sitterToggle.addEventListener("click",toggleSitter); ui.btnName.addEventListener("click",changeName); ui.btnReset.addEventListener("click",resetGame); ui.choiceLeft.addEventListener("click",()=>selectCurrentChoice(0)); ui.choiceRight.addEventListener("click",()=>selectCurrentChoice(1)); ui.btnChoiceClose.addEventListener("click",closeChoiceModal); ui.btnLetter.addEventListener("click",openLetter); ui.btnLetterClose.addEventListener("click",closeLetter); ui.btnLogs.addEventListener("click",openLogs); ui.btnLogsClose.addEventListener("click",closeLogs); ui.btnEndingLogs.addEventListener("click",()=>{ui.endingScreen.classList.remove("show"); openLogs();}); ui.btnEndingClose.addEventListener("click",()=>ui.endingScreen.classList.remove("show")); ui.btnPoopExit.addEventListener("click",endPoopGame);
  [ui.choiceModal,ui.letterModal,ui.logsModal].forEach(modal=>modal.addEventListener("click",e=>{if(e.target!==modal) return; if(modal===ui.choiceModal) closeChoiceModal(); if(modal===ui.letterModal) closeLetter(); if(modal===ui.logsModal) closeLogs();}));
  initSurveyGate(); let save=loadSave(); if(!save){save=createNewSave(); pushLiveLog(save,"ゲーム開始"); saveSave(save);} render(); function tick(){render(); requestAnimationFrame(tick);} tick();
})();
</script>
